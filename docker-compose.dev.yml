services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    volumes:
      - ./backend:/app
      - go_cache:/root/go/pkg
    command: air
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      VAKT_DEMO: "true"
      AUTO_MIGRATE: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    volumes:
      - ./backend:/app
      - go_cache:/root/go/pkg
    command: air -c air.worker.toml
    env_file: .env
    depends_on:
      redis:
        condition: service_started

  frontend:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - node_modules:/app/node_modules
    command: npm run dev -- --host
    environment:
      BACKEND_URL: http://api:8080
    ports:
      - "5173:5173"
    depends_on:
      - api

  postgres:
    image: postgres:16-alpine
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: sechealth
      POSTGRES_USER: sechealth
      POSTGRES_PASSWORD: sechealth
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sechealth"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres_data:
  redis_data:
  go_cache:
  node_modules:
