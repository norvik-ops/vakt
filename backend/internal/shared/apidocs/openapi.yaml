  /settings/ldap:
    get:
      summary: Get the LDAP directory configuration (bind password omitted)
      tags:
      - admin
      responses:
        '200':
          description: LDAP configuration
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                  bind_dn:
                    type: string
                  base_dn:
                    type: string
                  user_filter:
                    type: string
                  group_filter:
                    type: string
                  tls:
                    type: boolean
                  enabled:
                    type: boolean
        '401':
          description: Unauthorized
        '403':
          description: Forbidden — Admin role required
    put:
      summary: Validate and acknowledge an LDAP configuration change
      description: The config is process-global and env-var driven; the endpoint validates the body and
        returns a hint to set the VAKT_LDAP_* variables and restart. No state is mutated.
      tags:
      - admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                url:
                  type: string
                bind_dn:
                  type: string
                bind_pass:
                  type: string
                base_dn:
                  type: string
                user_filter:
                  type: string
                group_filter:
                  type: string
                tls:
                  type: boolean
      responses:
        '200':
          description: Configuration accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '400':
          description: Invalid request body
        '401':
          description: Unauthorized
        '403':
          description: Forbidden — Admin role required

  /settings/ldap/sync:
    post:
      summary: Trigger an LDAP directory sync
      tags:
      - admin
      responses:
        '200':
          description: Synced users. Field names are the Go struct field names — the LDAPUser struct carries
            no json tags.
          content:
            application/json:
              schema:
                type: object
                properties:
                  synced:
                    type: integer
                  users:
                    type: array
                    items:
                      type: object
                      properties:
                        DN:
                          type: string
                        Email:
                          type: string
                        DisplayName:
                          type: string
                        Groups:
                          type: array
                          items:
                            type: string
        '400':
          description: LDAP is not configured
        '401':
          description: Unauthorized
        '403':
          description: Forbidden — Admin role required
        '502':
          description: LDAP sync failed

  /settings/ldap/test:
    post:
      summary: Test the LDAP connection and bind
      tags:
      - admin
      responses:
        '200':
          description: Connection OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  users_found:
                    type: integer
        '400':
          description: LDAP is not configured
        '401':
          description: Unauthorized
        '403':
          description: Forbidden — Admin role required
        '502':
          description: LDAP connection failed

