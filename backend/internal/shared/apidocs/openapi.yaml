    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    post:
      summary: Resolve DSR (complete, reject, or extend with Art. 12 Abs. 3 justification)
      tags: [vaktprivacy]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [resolution_type]
              properties:
                resolution_type: { type: string, enum: [fulfilled, rejected, extended] }
                resolution_notes: { type: string }
                extension_reason: { type: string, description: "Required when resolution_type = extended" }
      responses:
        '200':
          description: Resolved DSR
        '400':
          description: extension_reason required for extension

  /vaktprivacy/dsr/{id}/assign:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    patch:
      summary: Assign DSR to a user
      tags: [vaktprivacy]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [assigned_to]
              properties:
                assigned_to: { type: string, format: uuid }
      responses:
        '200':
          description: Updated DSR

