  # ── S79: AI Endpoints ────────────────────────────────────────────────────────
  /vaktcomply/ai/status:
    get:
      summary: AI provider status
      tags: [ai]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Provider availability and CE usage summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  available: { type: boolean }
                  provider: { type: string }
                  model: { type: string }
                  monthly_usage: { type: integer }
                  monthly_limit: { type: integer }
  /vaktcomply/ai/usage:
    get:
      summary: CE monthly AI usage counter
      tags: [ai]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Usage counter for the current calendar month
          content:
            application/json:
              schema:
                type: object
                properties:
                  used: { type: integer }
                  limit: { type: integer }
  /vaktcomply/ai/models:
    get:
      summary: List locally available Ollama models
      tags: [ai]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Model names pulled into the local Ollama instance
          content:
            application/json:
              schema:
                type: object
                properties:
                  models:
                    type: array
                    items: { type: string }
  /vaktcomply/ai/report:
    post:
      summary: Generate an AI compliance report
      tags: [ai]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type]
              properties:
                type:
                  type: string
                  enum: [gap_analysis, risk_summary, executive_summary]
      responses:
        '200':
          description: AI-generated report text
          content:
            application/json:
              schema:
                type: object
                required: [type, report, ai_generated]
                properties:
                  type: { type: string }
                  report: { type: string }
                  ai_generated: { type: boolean, enum: [true] }
        '402':
          description: CE monthly quota exceeded
        '503':
          description: AI provider unavailable
  /vaktcomply/ai/advice:
    post:
      summary: Get prioritised compliance advice
      tags: [ai]
      security:
        - BearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                context: { type: string }
      responses:
        '200':
          description: AI-generated action recommendations
          content:
            application/json:
              schema:
                type: object
                required: [advice, ai_generated]
                properties:
                  advice: { type: string }
                  ai_generated: { type: boolean, enum: [true] }
  /vaktcomply/ai/draft-policy:
    post:
      summary: Generate an information-security policy draft
      tags: [ai]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [topic]
              properties:
                topic: { type: string }
                framework: { type: string }
      responses:
        '200':
          description: AI-generated policy draft
          content:
            application/json:
              schema:
                type: object
                required: [draft, ai_generated]
                properties:
                  draft: { type: string }
                  ai_generated: { type: boolean, enum: [true] }
  /vaktcomply/ai/incident-guide:
    post:
      summary: Generate an incident response guide
      tags: [ai]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [summary]
              properties:
                summary: { type: string }
                type: { type: string }
      responses:
        '200':
          description: AI-generated incident response checklist
          content:
            application/json:
              schema:
                type: object
                required: [guide, ai_generated]
                properties:
                  guide: { type: string }
                  ai_generated: { type: boolean, enum: [true] }
  /vaktcomply/ai/chat/stream:
    post:
      summary: Streaming AI compliance chat (SSE)
      tags: [ai]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [prompt]
              properties:
                system: { type: string }
                prompt: { type: string }
                max_tokens: { type: integer, default: 600 }
      responses:
        '200':
          description: SSE stream of AI response deltas
          content:
            text/event-stream:
              schema: { type: string }
  /vaktcomply/ai/controls/{id}/explain:
    post:
      summary: Stream an AI explanation for a compliance control gap (SSE)
      tags: [ai]
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: SSE stream of gap explanation
          content:
            text/event-stream:
              schema: { type: string }
  /vaktcomply/ai/risks/{id}/narrative:
    post:
      summary: Generate and persist an AI narrative for a risk
      tags: [ai]
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: AI-generated risk narrative (also persisted to ck_risks.ai_narrative)
          content:
            application/json:
              schema:
                type: object
                required: [narrative, ai_generated]
                properties:
                  narrative: { type: string }
                  ai_generated: { type: boolean, enum: [true] }
  /vaktcomply/ai/insights:
    get:
      summary: List AI-generated compliance insights
      tags: [ai]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of AI insights for the org
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id: { type: string, format: uuid }
                    type: { type: string }
                    title: { type: string }
                    message: { type: string }
                    urgency: { type: integer }
                    ai_generated: { type: boolean }
  /vaktcomply/ai/insights/{id}:
    delete:
      summary: Dismiss an AI insight
      tags: [ai]
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204':
          description: Insight dismissed
        '404':
          description: Insight not found
  /vaktcomply/ai/agent/run:
    post:
      summary: "Start an AI agent run (Plan/Execute/Reflect loop) — experimental, Pro+"
      tags: [ai]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [goal]
              properties:
                goal: { type: string }
                context_hints:
                  type: array
                  items: { type: string }
                max_iterations: { type: integer, default: 5 }
      responses:
        '200':
          description: "SSE stream of agent events (X-Vakt-Status: experimental)"
          content:
            text/event-stream:
              schema: { type: string }
        '402':
          description: agent_write_tools feature not available on this license
  /vaktcomply/ai/agent/runs/{run_id}/approve:
    post:
      summary: Approve a pending agent write-tool action
      tags: [ai]
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: run_id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204':
          description: Action approved
        '402':
          description: agent_write_tools feature not available
  /vaktcomply/ai/agent/runs/{run_id}/reject:
    post:
      summary: Reject a pending agent write-tool action
      tags: [ai]
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: run_id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204':
          description: Action rejected
        '402':
          description: agent_write_tools feature not available

  # ── System ────────────────────────────────────────────────────────────────
  /system/update:
    get:
      summary: Get update check status
      tags: [admin]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateInfo'
    put:
      summary: Enable or disable automatic update checks (Admin only, persisted in Redis)
      tags: [admin]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [enabled]
              properties:
                enabled:
                  type: boolean
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateInfo'
        '400':
          description: Bad request
        '403':
          description: Forbidden — Admin role required

  # ── S128-3: routes that were live but absent from this spec ─────────────

  /account/data-export:
    get:
      summary: Export the caller's personal data as a ZIP (DSGVO Art. 20)
      tags:
      - admin
      responses:
        '200':
          description: ZIP archive (Content-Disposition attachment)
          content:
            application/zip:
              schema:
                type: string
                format: binary
        '401':
          description: Unauthorized

  /account/delete:
    post:
      summary: Delete the caller's own account (DSGVO Art. 17)
      description: confirm must literally be the string "LÖSCHEN". On success the auth cookies are cleared.
      tags:
      - admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                password:
                  type: string
                confirm:
                  type: string
                  enum:
                  - LÖSCHEN
      responses:
        '200':
          description: Account deleted / anonymised
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
        '400':
          description: Invalid body
        '401':
          description: Unauthorized, or the supplied password is wrong
        '409':
          description: Caller is the last Admin of the organisation
        '422':
          description: Confirmation string missing

  /account/login-history:
    get:
      summary: List the caller's last 50 login attempts
      tags:
      - admin
      responses:
        '200':
          description: Login history, newest first
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    ts:
                      type: string
                      format: date-time
                    ip:
                      type: string
                    user_agent:
                      type: string
                    source:
                      type: string
                      enum:
                      - password
                      - oidc
                      - saml
                      - register
                      - magic_link
                      - api_key
                    result:
                      type: string
                      enum:
                      - ok
                      - bad_password
                      - locked
                      - mfa_failed
                      - oidc_failed
        '401':
          description: Unauthorized

  /admin/accounts/{email}/unlock:
    delete:
      summary: Clear the login lockout for an account (all source IPs)
      tags:
      - admin
      parameters:
      - name: email
        in: path
        required: true
        schema:
          type: string
          format: email
      responses:
        '200':
          description: Account unlocked
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '401':
          description: Unauthorized
        '403':
          description: Admin role or IP allowlist required

  /admin/audit-log/export.cef:
    get:
      summary: Export the audit log in ArcSight CEF format
      tags:
      - admin
      parameters:
      - name: days
        in: query
        description: Look-back window in days (default 30, capped at 365).
        schema:
          type: integer
          default: 30
          maximum: 365
      responses:
        '200':
          description: CEF lines, one audit entry per line (attachment)
          content:
            text/plain:
              schema:
                type: string
        '401':
          description: Unauthorized
        '403':
          description: Admin role or IP allowlist required

  /admin/audit-log/export.syslog:
    get:
      summary: Export the audit log in RFC 5424 syslog format
      tags:
      - admin
      parameters:
      - name: days
        in: query
        description: Look-back window in days (default 30, capped at 365).
        schema:
          type: integer
          default: 30
          maximum: 365
      responses:
        '200':
          description: Syslog lines, one audit entry per line (attachment)
          content:
            text/plain:
              schema:
                type: string
        '401':
          description: Unauthorized
        '403':
          description: Admin role or IP allowlist required

  /admin/audit-logs:
    get:
      summary: List audit log entries (paginated, filterable; CSV export via format=csv)
      tags:
      - admin
      parameters:
      - $ref: '#/components/parameters/PageParam'
      - $ref: '#/components/parameters/LimitParam'
      - name: user_id
        in: query
        schema:
          type: string
      - name: action
        in: query
        schema:
          type: string
      - name: resource_type
        in: query
        schema:
          type: string
      - name: format
        in: query
        description: Set to `csv` to download the result as CSV instead of JSON.
        schema:
          type: string
          enum:
          - csv
      responses:
        '200':
          description: Paginated audit log entries (JSON) or CSV attachment when format=csv
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    nullable: true
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                        org_id:
                          type: string
                          format: uuid
                        user_id:
                          type: string
                          format: uuid
                          nullable: true
                        action:
                          type: string
                        resource_type:
                          type: string
                        resource_id:
                          type: string
                          nullable: true
                        ip_address:
                          type: string
                          nullable: true
                        timestamp:
                          type: string
                          format: date-time
                  total:
                    type: integer
                  page:
                    type: integer
                  limit:
                    type: integer
            text/csv:
              schema:
                type: string
        '401':
          description: Unauthorized
        '403':
          description: Admin role or IP allowlist required

  /admin/health:
    get:
      summary: Admin health snapshot (DB, Redis, queue, uptime)
      tags:
      - admin
      responses:
        '200':
          description: Health snapshot
          content:
            application/json:
              schema:
                type: object
                properties:
                  db:
                    type: object
                    properties:
                      ok:
                        type: boolean
                      latency_ms:
                        type: integer
                        format: int64
                  redis:
                    type: object
                    properties:
                      ok:
                        type: boolean
                      latency_ms:
                        type: integer
                        format: int64
                  queue:
                    type: object
                    properties:
                      pending:
                        type: integer
                      active:
                        type: integer
                      failed:
                        type: integer
                  version:
                    type: string
                  uptime_seconds:
                    type: integer
                    format: int64
                  goroutines:
                    type: integer
        '401':
          description: Unauthorized
        '403':
          description: Admin role or IP allowlist required

  /admin/invitations:
    get:
      summary: List team invitations of the organisation
      tags:
      - admin
      responses:
        '200':
          description: Invitations
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                      format: uuid
                    org_id:
                      type: string
                      format: uuid
                    email:
                      type: string
                      format: email
                    role:
                      type: string
                    invited_by:
                      type: string
                    accepted_at:
                      type: string
                      format: date-time
                      nullable: true
                    expires_at:
                      type: string
                      format: date-time
                    created_at:
                      type: string
                      format: date-time
        '401':
          description: Unauthorized
        '403':
          description: Admin role required
    post:
      summary: Create a team invitation (sends an email when SMTP is configured)
      tags:
      - admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - email
              - role
              properties:
                email:
                  type: string
                  format: email
                role:
                  type: string
                  enum:
                  - admin
                  - editor
                  - viewer
      responses:
        '201':
          description: Created invitation (the raw token is never returned)
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  org_id:
                    type: string
                    format: uuid
                  email:
                    type: string
                    format: email
                  role:
                    type: string
                  invited_by:
                    type: string
                  accepted_at:
                    type: string
                    format: date-time
                    nullable: true
                  expires_at:
                    type: string
                    format: date-time
                  created_at:
                    type: string
                    format: date-time
        '400':
          description: Invalid request body
        '401':
          description: Unauthorized
        '403':
          description: Admin role required
        '422':
          description: Validation error

  /admin/invitations/{id}:
    delete:
      summary: Revoke a pending invitation
      tags:
      - admin
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '204':
          description: Invitation revoked
        '401':
          description: Unauthorized
        '403':
          description: Admin role required
        '404':
          description: Invitation not found

  /admin/jobs:
    get:
      summary: Asynq queue statistics per queue
      tags:
      - admin
      responses:
        '200':
          description: Queue statistics (null when no queue is known to Asynq)
          content:
            application/json:
              schema:
                type: array
                nullable: true
                items:
                  type: object
                  properties:
                    queue:
                      type: string
                    active:
                      type: integer
                    pending:
                      type: integer
                    retry:
                      type: integer
                    failed:
                      type: integer
                    size:
                      type: integer
        '401':
          description: Unauthorized
        '403':
          description: Admin role or IP allowlist required

  /admin/modules:
    get:
      summary: List platform modules and their enabled state
      tags:
      - admin
      responses:
        '200':
          description: Module status list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        enabled:
                          type: boolean
        '401':
          description: Unauthorized
        '403':
          description: Admin role or IP allowlist required

  /admin/notifications/channels:
    get:
      summary: List notification channels of the organisation
      tags:
      - admin
      responses:
        '200':
          description: Notification channels
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    nullable: true
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                        org_id:
                          type: string
                          format: uuid
                        name:
                          type: string
                        channel:
                          type: string
                          enum:
                          - slack
                          - teams
                          - email
                          - webhook
                        config:
                          type: object
                          description: Always `{}` — the stored config is never returned.
                        is_active:
                          type: boolean
                        created_at:
                          type: string
                          format: date-time
                        updated_at:
                          type: string
                          format: date-time
        '401':
          description: Unauthorized
        '403':
          description: Admin role or IP allowlist required
    post:
      summary: Create a notification channel
      tags:
      - admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - name
              - channel
              - config
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 128
                channel:
                  type: string
                  enum:
                  - slack
                  - teams
                  - email
                  - webhook
                config:
                  type: object
                  description: Channel-specific configuration (stored encrypted, never returned).
      responses:
        '201':
          description: Created channel
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  org_id:
                    type: string
                    format: uuid
                  name:
                    type: string
                  channel:
                    type: string
                    enum:
                    - slack
                    - teams
                    - email
                    - webhook
                  config:
                    type: object
                    description: Always `{}` — the stored config is never returned.
                  is_active:
                    type: boolean
                  created_at:
                    type: string
                    format: date-time
                  updated_at:
                    type: string
                    format: date-time
        '400':
          description: Invalid request body
        '401':
          description: Unauthorized
        '403':
          description: Admin role or IP allowlist required
        '422':
          description: Validation error

  /admin/notifications/channels/{id}:
    delete:
      summary: Delete a notification channel
      tags:
      - admin
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Channel deleted
          content:
            application/json:
              schema:
                type: object
