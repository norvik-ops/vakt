  /vaktprivacy/breaches/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      summary: Get a breach record
      tags:
      - vaktprivacy
      responses:
        '200':
          description: Breach record (Art. 33/34 DSGVO)
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  org_id:
                    type: string
                    format: uuid
                  title:
                    type: string
                  description:
                    type: string
                  discovered_at:
                    type: string
                    format: date-time
                  authority_deadline_at:
                    type: string
                    format: date-time
                  authority_notified_at:
                    type: string
                    format: date-time
                    nullable: true
                  subjects_notification_required:
                    type: boolean
                  subjects_notified_at:
                    type: string
                    format: date-time
                    nullable: true
                  affected_count:
                    type: integer
                    nullable: true
                  data_categories:
                    type: array
                    items:
                      type: string
                  status:
                    type: string
                    enum:
                    - open
                    - authority_notified
                    - closed
                  created_at:
                    type: string
                    format: date-time
                  updated_at:
                    type: string
                    format: date-time
        '400':
          description: Malformed UUID path parameter
        '401':
          description: Unauthorized
        '404':
          description: Breach not found
    put:
      summary: Update a breach record
      tags:
      - vaktprivacy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - title
              - description
              properties:
                title:
                  type: string
                  maxLength: 255
                description:
                  type: string
                  maxLength: 10000
                subjects_notification_required:
                  type: boolean
                affected_count:
                  type: integer
                  nullable: true
                data_categories:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Updated breach record
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  org_id:
                    type: string
                    format: uuid
                  title:
                    type: string
                  description:
                    type: string
                  discovered_at:
                    type: string
                    format: date-time
                  authority_deadline_at:
                    type: string
                    format: date-time
                  authority_notified_at:
                    type: string
                    format: date-time
                    nullable: true
                  subjects_notification_required:
                    type: boolean
                  subjects_notified_at:
                    type: string
                    format: date-time
                    nullable: true
                  affected_count:
                    type: integer
                    nullable: true
                  data_categories:
                    type: array
                    items:
                      type: string
                  status:
                    type: string
                    enum:
                    - open
                    - authority_notified
                    - closed
                  created_at:
                    type: string
                    format: date-time
                  updated_at:
                    type: string
                    format: date-time
        '400':
          description: Invalid request body or malformed UUID path parameter
        '401':
          description: Unauthorized
        '403':
          description: Forbidden — requires Admin or SecurityAnalyst
        '422':
          description: Validation error
    delete:
      summary: Delete a breach record
      tags:
      - vaktprivacy
      responses:
        '204':
          description: Deleted
        '400':
          description: Malformed UUID path parameter
        '401':
          description: Unauthorized
        '403':
          description: Forbidden — requires Admin

  /vaktprivacy/breaches/{id}/notification-pdf:
    get:
      summary: Export the Art. 33 authority notification for a breach as PDF
      tags:
      - vaktprivacy
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Breach notification PDF (streamed; generation errors are logged, not surfaced)
