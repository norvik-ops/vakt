  # ── Sprint 67: NIS2 Art.23 Stage Reporting ────────────────────────────────

  /vaktcomply/incidents/{id}/nis2/assess:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    post:
      summary: Mark incident as NIS2-reportable and set 3-stage deadlines
      operationId: assessNIS2Reportability
      tags: [vaktcomply]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [detected_at, check]
              properties:
                detected_at: { type: string, format: date-time }
                check:
                  type: object
                  properties:
                    causes_significant_disruption: { type: boolean }
                    affects_third_parties: { type: boolean }
                    causes_financial_damage: { type: boolean }
      responses:
        '204':
          description: Reportability assessed
        '400':
          description: Invalid input

  /vaktcomply/incidents/{id}/nis2-status:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      summary: Get NIS2 reporting status for an incident
      operationId: getNIS2Status
      tags: [vaktcomply]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: NIS2 reporting status
          content:
            application/json:
              schema:
                type: object
                properties:
                  is_reportable: { type: boolean }
                  reporting_stage: { type: string }
                  detected_at: { type: string, format: date-time, nullable: true }
                  deadlines:
                    type: object
                    properties:
                      early_warning: { type: string, format: date-time, nullable: true }
                      full_report: { type: string, format: date-time, nullable: true }
                      final_report: { type: string, format: date-time, nullable: true }
                  completed_stages:
                    type: array
                    items: { type: string }
                  reports:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        stage: { type: string }
                        submitted_at: { type: string, format: date-time, nullable: true }
                        pdf_path: { type: string }

  /vaktcomply/incidents/{id}/nis2/submit/{stage}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
      - name: stage
        in: path
        required: true
        schema: { type: string, enum: [early_warning, full_report, final_report] }
    post:
      summary: Submit NIS2 report stage content
      operationId: submitNIS2Stage
      tags: [vaktcomply]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                affected_services: { type: string }
                initial_assessment: { type: string }
                root_cause: { type: string }
                affected_users_estimate: { type: integer, nullable: true }
                measures_taken: { type: string }
                estimated_recovery: { type: string, nullable: true }
                full_root_cause_analysis: { type: string }
                permanent_measures: { type: string }
                effectiveness_evidence: { type: string }
      responses:
        '200':
          description: Stage report saved
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string }
                  stage: { type: string }
                  submitted_at: { type: string, format: date-time, nullable: true }
                  pdf_path: { type: string }

  /vaktcomply/authority-contacts:
    get:
      summary: List authority contacts (built-in + org-specific)
      operationId: listAuthorityContacts
      tags: [vaktcomply]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of authority contacts
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id: { type: string }
                    country: { type: string }
                    sector: { type: string }
                    authority_name: { type: string }
                    report_url: { type: string }
                    email: { type: string }
                    phone: { type: string }
                    notes: { type: string }
                    is_primary: { type: boolean }
                    is_builtin: { type: boolean }
                    created_at: { type: string }
    post:
      summary: Create a custom authority contact
      operationId: createAuthorityContact
      tags: [vaktcomply]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [country, authority_name]
              properties:
                country: { type: string }
                sector: { type: string }
                authority_name: { type: string }
                report_url: { type: string }
                email: { type: string }
                phone: { type: string }
                notes: { type: string }
                is_primary: { type: boolean }
      responses:
        '201':
          description: Authority contact created

  # ── Sprint 67: Evidence Staleness Scoring ────────────────────────────────────

  /vaktcomply/compliance-score:
    get:
      summary: Get evidence-based compliance score
      operationId: getComplianceScore
      tags: [vaktcomply]
