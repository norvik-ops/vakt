      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Protection-need link (null when the asset is unlinked)
          content:
            application/json:
              schema:
                type: object
                properties:
                  protection_need_id:
                    type: string
                    format: uuid
                    nullable: true
                required:
                - protection_need_id
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - role not permitted

  /vaktscan/assets/{id}/sbom:
