                      type: string
                      format: uuid
                    name:
                      type: string
                    email:
                      type: string
        '401':
          description: Unauthorized

  /setup:
    post:
      summary: First-run setup — create the organisation and its admin account
      tags:
      - admin
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                org_name:
                  type: string
                  minLength: 2
                  maxLength: 120
                admin_email:
                  type: string
                  format: email
                admin_password:
                  type: string
                  minLength: 10
                  maxLength: 72
                  description: Min. 10 characters, at least one uppercase letter, one digit and one special
                    character
                modules_enabled:
                  type: array
                  items:
                    type: string
                smtp_host:
                  type: string
                smtp_port:
                  type: string
              required:
              - org_name
              - admin_email
              - admin_password
      responses:
        '201':
          description: Setup complete
          content:
            application/json:
              schema:
                type: object
                properties:
                  org_id:
                    type: string
                    format: uuid
                  user_id:
                    type: string
                    format: uuid
                  message:
                    type: string
                required:
                - org_id
                - user_id
                - message
        '400':
          description: Invalid body or password too weak
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  code:
                    type: string
                    enum:
                    - SETUP_BAD_REQUEST
                    - AUTH_WEAK_PASSWORD
        '409':
          description: Setup has already been completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  code:
                    type: string
                    example: SETUP_ALREADY_COMPLETE
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  code:
                    type: string
                    example: SETUP_VALIDATION_ERROR
        '500':
          description: Setup failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  code:
                    type: string
                    enum:
                    - SETUP_STATUS_ERROR
                    - SETUP_INTERNAL_ERROR
                    - SETUP_ORG_ERROR
                    - SETUP_USER_ERROR
                    - SETUP_ROLE_ERROR
                    - SETUP_MEMBER_ERROR

  /setup/status:
    get:
      summary: Whether first-run setup has been completed
      tags:
      - admin
      security: []
      responses:
        '200':
          description: Setup status
          content:
            application/json:
              schema:
                type: object
                properties:
                  setup_complete:
                    type: boolean
                required:
                - setup_complete
        '500':
          description: Status check failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  code:
                    type: string
                    example: SETUP_STATUS_ERROR

