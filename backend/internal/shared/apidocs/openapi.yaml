                  last_used_at:
                    type: string
                    format: date-time
                    nullable: true
                  last_used_ip:
                    type: string
                    nullable: true
                  expires_at:
                    type: string
                    format: date-time
                    nullable: true
                  created_at:
                    type: string
                    format: date-time
                  rotated_at:
                    type: string
                    format: date-time
                    nullable: true
                  raw_key:
                    type: string
        '400':
          description: Invalid request body or expires_at not RFC3339
        '401':
          description: Unauthorized
        '403':
          description: Forbidden — Admin/SecurityAnalyst role and the api_access Pro feature required
        '422':
          description: Validation error

