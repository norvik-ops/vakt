              required:
              - file
      responses:
        '200':
          description: Import result
          content:
            application/json:
              schema:
                type: object
                properties:
                  inserted:
                    type: integer
                  errored:
                    type: integer
                  errors:
                    type: array
                    nullable: true
                    items:
                      type: string
                required:
                - inserted
                - errored
                - errors
        '400':
          description: Missing file field or CSV parse error
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - role not permitted

