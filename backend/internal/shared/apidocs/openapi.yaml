      - name: token
        in: path
        required: true
        description: Opaque status token issued at submission time (not a UUID)
        schema:
          type: string
      responses:
        '200':
          description: Public DSR status view
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  status:
                    type: string
                  type:
                    type: string
                  created_at:
                    type: string
                    format: date-time
                  updated_at:
                    type: string
                    format: date-time
                  completed_at:
                    type: string
                    format: date-time
                    nullable: true
