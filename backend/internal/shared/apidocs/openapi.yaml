  /vaktvault/tokens:
    get:
      summary: List vault API tokens of the current user (Pro — API feature)
      tags:
      - vaktvault
      responses:
        '200':
          description: API tokens (raw key is never returned here)
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                      format: uuid
                    name:
                      type: string
                    key_prefix:
                      type: string
                    scopes:
                      type: array
                      items:
                        type: string
                    expires_at:
                      type: string
                      format: date-time
                      nullable: true
                    last_used_at:
                      type: string
                      format: date-time
                      nullable: true
                    revoked_at:
                      type: string
                      format: date-time
                      nullable: true
                    created_at:
                      type: string
                      format: date-time
        '401':
          description: Unauthorized
        '402':
          description: Feature not available — requires Vakt Pro (API)
        '403':
          description: Forbidden — Admin or SecurityAnalyst role required
    post:
      summary: Create a vault API token (Pro — API feature, Admin only)
      tags:
      - vaktvault
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - name
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 120
                expires_at:
                  type: string
                  format: date-time
                  nullable: true
      responses:
        '201':
          description: Token created — the raw key is returned exactly once in `key`
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  name:
                    type: string
                  key_prefix:
                    type: string
                  scopes:
                    type: array
                    items:
                      type: string
                  expires_at:
                    type: string
                    format: date-time
                    nullable: true
                  last_used_at:
                    type: string
                    format: date-time
                    nullable: true
                  revoked_at:
                    type: string
                    format: date-time
                    nullable: true
                  created_at:
                    type: string
                    format: date-time
                  key:
                    type: string
                    description: Raw API key — returned only on creation, never stored in plaintext.
        '400':
          description: Invalid request body
        '401':
          description: Unauthorized
        '402':
          description: Feature not available — requires Vakt Pro (API)
        '403':
          description: Forbidden — Admin role required
        '422':
          description: Validation error

  /vaktvault/tokens/{id}:
    delete:
      summary: Revoke a vault API token (Pro — API feature, Admin only)
      tags:
      - vaktvault
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '204':
          description: Token revoked
        '400':
          description: Malformed token id
        '401':
          description: Unauthorized
        '402':
          description: Feature not available — requires Vakt Pro (API)
        '403':
          description: Forbidden — Admin role required
