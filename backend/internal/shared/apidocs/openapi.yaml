  /audit-log:
    get:
      summary: Query the organisation's audit log
      tags:
      - admin
      parameters:
      - name: limit
        in: query
        description: Number of entries (default 100, capped at 500)
        schema:
          type: integer
          default: 100
          maximum: 500
      - name: offset
        in: query
        schema:
          type: integer
          default: 0
      - name: from
        in: query
        description: RFC3339 timestamp — created_at >= from
        schema:
          type: string
          format: date-time
      - name: to
        in: query
        description: RFC3339 timestamp — created_at <= to
        schema:
          type: string
          format: date-time
      - name: user_email
        in: query
        description: Case-insensitive substring match
        schema:
          type: string
      - name: action
        in: query
        description: Exact match on the action field
        schema:
          type: string
      responses:
        '200':
          description: Audit log entries and total count for the filter set
          content:
            application/json:
              schema:
                type: object
                properties:
                  entries:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        org_id:
                          type: string
                          format: uuid
                        user_id:
                          type: string
                          nullable: true
                        user_email:
                          type: string
                        action:
                          type: string
                        resource_type:
                          type: string
                        resource_id:
                          type: string
                        resource_name:
                          type: string
                        details:
                          type: object
                          additionalProperties:
                            type: string
                        ip_address:
                          type: string
                        created_at:
                          type: string
                          format: date-time
                      required:
                      - id
                      - org_id
                      - action
                      - resource_type
                      - created_at
                  total:
                    type: integer
                required:
                - entries
                - total
        '401':
          description: Unauthorized
        '500':
          description: Fetch failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  code:
                    type: string
                    example: AUDIT_LOG_FETCH_FAILED

