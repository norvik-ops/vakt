  /license:
    get:
      summary: Current license state of the calling organisation
      tags:
      - admin
      responses:
        '200':
          description: License state
          content:
            application/json:
              schema:
                type: object
                properties:
                  tier:
                    type: string
                  is_pro:
                    type: boolean
                  features:
                    type: array
                    items:
                      type: string
                  org_name:
                    type: string
                  expires_at:
                    type: string
                    format: date-time
                    nullable: true
                  demo:
                    type: boolean
                  auto_renewal_enabled:
                    type: boolean
                  renewal_failing:
                    type: boolean
                    description: >-
                      True while auto-renewal is armed, the key has entered its renewal
                      window and the last attempt did not yield a newer key (open invoice,
                      cancelled subscription, missing renewal token or an unreachable
                      renewal server). The key will lapse unless someone acts. Always false
                      while renewal is not yet due.
                required:
                - tier
                - is_pro
                - features
                - org_name
                - expires_at
                - demo
                - auto_renewal_enabled
                - renewal_failing
        '401':
          description: Unauthorized

  /license/activate:
    post:
      summary: Validate and persist a Pro license key (Admin only)
      tags:
      - admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                key:
                  type: string
              required:
              - key
      responses:
        '200':
          description: License activated
          content:
            application/json:
              schema:
                type: object
                properties:
                  tier:
                    type: string
                  is_pro:
                    type: boolean
                  features:
                    type: array
                    items:
                      type: string
                  org_name:
                    type: string
                  expires_at:
                    type: string
                    format: date-time
                    nullable: true
                  demo:
                    type: boolean
                  auto_renewal_enabled:
                    type: boolean
                  renewal_failing:
                    type: boolean
                    description: >-
                      True while auto-renewal is armed, the key has entered its renewal
                      window and the last attempt did not yield a newer key (open invoice,
                      cancelled subscription, missing renewal token or an unreachable
                      renewal server). The key will lapse unless someone acts. Always false
                      while renewal is not yet due.
                required:
                - tier
                - is_pro
                - features
                - org_name
                - expires_at
                - demo
                - auto_renewal_enabled
                - renewal_failing
        '400':
          description: Invalid body or missing key
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  code:
                    type: string
                    enum:
                    - LICENSE_BAD_REQUEST
                    - LICENSE_KEY_MISSING
        '401':
          description: Unauthorized — no organisation context
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  code:
                    type: string
                    example: LICENSE_NO_ORG
        '403':
          description: Admin role required
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  code:
                    type: string
                    example: AUTH_INSUFFICIENT_ROLE
        '422':
          description: License key invalid, expired, or bound to a different organisation
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  code:
                    type: string
                    example: LICENSE_INVALID_KEY

