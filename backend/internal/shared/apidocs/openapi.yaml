    put:
      summary: Update exception (approve/reject/extend)
      tags: [vaktcomply]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status: { type: string, enum: [approved, rejected] }
                reviewer_comment: { type: string }
                expires_at: { type: string, format: date }
      responses:
        '200':
          description: Updated exception
    delete:
      summary: Delete exception
      tags: [vaktcomply]
      responses:
        '204':
          description: Deleted

