  # ── SecPrivacy — DSR ─────────────────────────────────────────────────────

  /vaktprivacy/dsr-portal-settings:
    get:
      summary: Get the public DSR portal settings
      description: |
        Settings for the org's public data-subject-request portal (the page a data
        subject reaches without an account). Reading is open to any authenticated
        member; changing requires Admin.
      tags: [vaktprivacy]
      responses:
        '200':
          description: Portal settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DSRPortalSettings'
        '401': { description: Unauthorized }
    patch:
      summary: Update the public DSR portal settings
      tags: [vaktprivacy]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DSRPortalSettings'
      responses:
        '204': { description: Updated }
        '400': { description: Invalid request body }
        '401': { description: Unauthorized }
        '403': { description: Forbidden — Admin only }

  /vaktprivacy/dsr:
    get:
      summary: List data subject requests (Art. 15–22 DSGVO)
      tags: [vaktprivacy]
      parameters:
        - name: status
          in: query
          schema: { type: string, enum: [open, in_progress, completed, rejected] }
        - name: type
          in: query
          schema: { type: string, enum: [access, erasure, rectification, portability, restriction, objection] }
      responses:
        '200':
          description: List of DSRs
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id: { type: string, format: uuid }
                    type: { type: string }
                    status: { type: string }
                    subject_name: { type: string }
                    subject_email: { type: string }
                    received_at: { type: string, format: date-time }
                    deadline: { type: string, format: date }
    post:
      summary: Create DSR record
      tags: [vaktprivacy]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type, subject_email]
              properties:
                type: { type: string, enum: [access, erasure, rectification, portability, restriction, objection] }
                subject_name: { type: string }
                subject_email: { type: string, format: email }
                description: { type: string }
      responses:
        '201':
          description: Created DSR

  /vaktprivacy/dsr/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    put:
      summary: Update DSR status
      tags:
      - vaktprivacy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum:
                  - open
                  - in_progress
                  - completed
                  - rejected
                notes:
                  type: string
                rejection_reason:
                  type: string
      responses:
        '200':
          description: Updated DSR
    delete:
      summary: Delete a data subject request
      tags:
      - vaktprivacy
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '204':
          description: Deleted
        '400':
          description: Malformed UUID path parameter
        '401':
          description: Unauthorized
        '403':
          description: Forbidden — requires Admin

  # --- Sprint 68: DSR Enhancements ---

  /vaktprivacy/dsr/summary:
    get:
      summary: Get DSR summary statistics
      tags: [vaktprivacy]
      responses:
        '200':
          description: DSR summary with overdue count and on-time rate
          content:
            application/json:
              schema:
                type: object
                properties:
                  open_count: { type: integer }
                  overdue_count: { type: integer }
                  fulfilled_last_12m: { type: integer }
                  rejected_last_12m: { type: integer }
                  on_time_rate_pct: { type: number }

  /vaktprivacy/dsr/export:
    get:
      summary: Export DSR audit log
      tags: [vaktprivacy]
      parameters:
        - name: format
          in: query
          schema: { type: string, enum: [pdf, csv], default: pdf }
        - name: period_days
          in: query
          schema: { type: integer, default: 365 }
      responses:
        '200':
          description: PDF or CSV export

