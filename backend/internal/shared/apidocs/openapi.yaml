    get:
      summary: Export SoA as Word/DOCX (Pro)
      description: Returns an editable .docx Statement of Applicability. Requires FeatureAuditPDF. SHA-256 audit-logged. (S89-6)
      operationId: exportSoaDocx
      tags: [vaktcomply]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: DOCX file
          content:
