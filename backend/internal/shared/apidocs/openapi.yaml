  /vaktprivacy/avvs/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      summary: Get AVV
      tags: [vaktprivacy]
      responses:
        '200':
          description: AVV
    put:
      summary: Update AVV
      tags: [vaktprivacy]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status: { type: string, enum: [draft, active, terminated] }
