                    type: string
                    format: date-time
                  updated_at:
                    type: string
                    format: date-time
        '400':
          description: Invalid request body
        '401':
          description: Unauthorized
        '403':
          description: Forbidden — requires Admin or SecurityAnalyst
        '422':
          description: Validation error

