  /vaktvault/git-scans:
    get:
      summary: List git secret scans (Pro — Vault feature)
      description: 'Cursor-paginated by default (envelope with `data` + `pagination`). Passing the legacy
        `page` query parameter switches the response to a bare array and sets the Deprecation/Sunset headers.

        '
      tags:
      - vaktvault
      parameters:
      - name: cursor
        in: query
        required: false
        description: Opaque cursor from `pagination.next_cursor`.
        schema:
          type: string
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          default: 25
      - name: page
        in: query
        required: false
        description: Deprecated. Any non-empty value selects the legacy un-paginated array response.
        schema:
          type: integer
      responses:
        '200':
          description: Cursor envelope (default) or, with `page`, the deprecated bare array
          content:
            application/json:
              schema:
                oneOf:
                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        type: object
                        properties:
                          id:
                            type: string
                            format: uuid
                          org_id:
                            type: string
                            format: uuid
                          repo_url:
                            type: string
                          branch:
                            type: string
                          status:
                            type: string
                          finding_count:
                            type: integer
                          open_count:
                            type: integer
                          dismissed_count:
                            type: integer
                          error_message:
                            type: string
                          scanned_at:
                            type: string
                            format: date-time
                            nullable: true
                          created_at:
                            type: string
                            format: date-time
                    pagination:
                      type: object
                      properties:
                        limit:
                          type: integer
                        next_cursor:
                          type: string
                        has_more:
                          type: boolean
                - type: array
                  items:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      org_id:
                        type: string
                        format: uuid
                      repo_url:
                        type: string
                      branch:
                        type: string
                      status:
                        type: string
                      finding_count:
                        type: integer
                      open_count:
                        type: integer
                      dismissed_count:
                        type: integer
                      error_message:
                        type: string
                      scanned_at:
                        type: string
                        format: date-time
                        nullable: true
                      created_at:
                        type: string
                        format: date-time
        '401':
          description: Unauthorized
        '402':
          description: Feature not available — requires Vakt Pro (Vault)
        '403':
          description: Forbidden — Admin or SecurityAnalyst role required
    post:
      summary: Trigger a git secret scan (Pro — Vault feature)
      tags:
      - vaktvault
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - repo_url
              - branch
              properties:
                repo_url:
                  type: string
                  description: HTTPS-only; private/loopback/link-local targets are rejected (SSRF guard).
                branch:
                  type: string
                credentials:
                  type: object
                  description: Optional clone credentials — used only during the clone, never stored.
                  required:
                  - type
                  properties:
                    type:
                      type: string
                      enum:
                      - github_token
                      - basic
                    token:
                      type: string
                    user:
                      type: string
                    pass:
                      type: string
      responses:
        '202':
          description: Scan queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  org_id:
                    type: string
                    format: uuid
                  repo_url:
                    type: string
                  branch:
                    type: string
                  status:
                    type: string
                  finding_count:
                    type: integer
                  open_count:
                    type: integer
                  dismissed_count:
                    type: integer
                  error_message:
                    type: string
                  scanned_at:
                    type: string
                    format: date-time
                    nullable: true
                  created_at:
                    type: string
                    format: date-time
        '400':
          description: Invalid request body or rejected repo_url (SSRF guard)
        '401':
          description: Unauthorized
        '402':
          description: Feature not available — requires Vakt Pro (Vault)
        '403':
          description: Forbidden — Admin or SecurityAnalyst role required
        '422':
          description: Validation error

