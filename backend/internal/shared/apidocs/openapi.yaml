openapi: 3.0.3
info:
  title: Vakt API
  version: "0.42.46"
  description: |
    Self-hosted Security & Compliance Platform API.
    All data stays within your infrastructure — no phone-home, no cloud dependency.

    **Authentication:** Paseto v4 bearer tokens. Obtain a token via `POST /auth/login`.
    Include it as `Authorization: Bearer <token>` on all protected endpoints.

    **Base URL:** `/api/v1`

    **Pagination:** `?page=1&limit=25` on list endpoints.

    **Error format:**
    ```json
    { "error": "message", "code": "ERROR_CODE", "details": {} }
    ```

servers:
  - url: /api/v1
    description: Vakt API v1

security:
  - BearerAuth: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Paseto

  parameters:
    PageParam:
      name: page
      in: query
      schema:
        type: integer
        default: 1
    LimitParam:
      name: limit
      in: query
      schema:
        type: integer
        default: 25
        maximum: 100

  schemas:
    UpdateInfo:
      type: object
      required: [check_enabled, current_version, update_available]
      properties:
        check_enabled:
          type: boolean
        current_version:
          type: string
          example: "0.42.16"
        latest_version:
          type: string
          example: "0.42.16"
        update_available:
          type: boolean
        release_url:
          type: string
          format: uri

    Error:
      type: object
      properties:
        error:
          type: string
        code:
          type: string

    Pagination:
      type: object
      properties:
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer

    # ── Auth ──────────────────────────────────────────────────────────────────

    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string

    RefreshResponse:
      type: object
      properties:
        token:
          type: string
          description: New Paseto v4 access token
        refresh_token:
          type: string
          description: New refresh token

    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: ok
        version:
          type: string
          description: Version-Tag der laufenden Instanz (z.B. "v0.14.1")
        demo:
          type: boolean
          description: True wenn die Instanz im Demo-Modus läuft (VAKT_DEMO=true).
        sso_enabled:
          type: boolean
          description: True wenn Casdoor-OIDC konfiguriert ist (Login-Page blendet SSO-Button ein).

    DemoStartResponse:
      type: object
      required: [admin_email, admin_password, analyst_email, analyst_password, expires_in]
      properties:
        admin_email:
          type: string
          format: email
        admin_password:
          type: string
          description: Klartext-Passwort (einmaliger Disclosure — danach nur Bcrypt-Hash in DB).
        analyst_email:
          type: string
          format: email
        analyst_password:
          type: string
        expires_in:
          type: integer
          description: Sekunden bis die ephemere Demo-Org von Asynq-Cleanup gelöscht wird (default 14400 = 4h).

    SessionInfo:
      type: object
      required: [id, last_used, created_at, expires_at]
      properties:
        id:
          type: string
          format: uuid
        device_hint:
          type: string
          description: User-Agent-Auszug (max. 120 Zeichen)
        last_used:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        is_current:
          type: boolean
          description: True, wenn diese Session zur aktuellen X-Vakt-Session-Id passt.

    TOTPStatusResponse:
      type: object
      properties:
        enabled:
          type: boolean

    TOTPSetupResponse:
      type: object
      properties:
        secret:
          type: string
          description: Base32-encoded TOTP secret (display to user for manual entry)
        uri:
          type: string
          description: otpauth:// URI for QR code generation

    TOTPConfirmRequest:
      type: object
      required: [code]
      properties:
        code:
          type: string
          description: 6-digit TOTP code from authenticator app

    TOTPConfirmResponse:
      type: object
      properties:
        backup_codes:
          type: array
          items:
            type: string
          description: Single-use backup codes (store securely)
        recovery_codes:
          type: array
          items:
            type: string
          description: Recovery codes for account recovery

    TOTPCodeRequest:
      type: object
      required: [code]
      properties:
        code:
          type: string
          description: 6-digit TOTP code

    TOTPVerifyRequest:
      type: object
      properties:
        code:
          type: string
          description: 6-digit TOTP code
        backup_code:
          type: string
          description: Single-use backup code (alternative to code)

    TOTPRecoveryRequest:
      type: object
      required: [code]
      properties:
        code:
          type: string
          description: Recovery code

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    LoginResponse:
      type: object
      # access_token/refresh_token/expires_in are absent in the two-stage MFA
      # response (S124-1): when the account has TOTP enabled, login returns
      # mfa_required=true + mfa_token instead of a session. Only user is always set.
      required: [user]
      properties:
        mfa_required:
          type: boolean
          description: True when the account has MFA enabled — no session is issued
            yet; POST mfa_token + a TOTP/backup code to /auth/2fa/login-verify.
        mfa_token:
          type: string
          description: Short-lived mfa_pending token (only present when mfa_required).
        access_token:
          type: string
          description: Paseto v4 bearer token (lebt 1 Stunde)
        refresh_token:
          type: string
          description: Opaque refresh token (lebt 30 Tage, in Redis hinterlegt)
        expires_in:
          type: integer
          description: Access-Token-Lebenszeit in Sekunden
        user:
          $ref: '#/components/schemas/User'
        session_id:
          type: string
          format: uuid
          description: refresh_sessions.id der gerade ausgestellten Session — Frontend
            speichert sie und sendet sie als X-Vakt-Session-Id Header beim Sessions-Endpoint,
            damit "diese Session" in der UI markiert + Revoke-All-Others sich selbst
            ausnehmen kann.
        csrf_token:
          type: string
          description: Spiegelt den csrf_token-Cookie-Wert. Fallback für den Fall, dass
            ein Reverse Proxy/CDN vor der Instanz den Set-Cookie-Header umschreibt und
            document.cookie ihn dadurch nicht mehr lesen kann — der Body-Wert ist davon
            unberührt (client.ts nutzt ihn als In-Memory-Fallback).

    User:
      type: object
      required: [id, email, display_name, roles]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        display_name:
          type: string
        roles:
          type: array
          items:
            type: string
            enum: [Admin, SecurityAnalyst, Auditor, Viewer]

    AuthMeResponse:
      allOf:
        - $ref: '#/components/schemas/User'
        - type: object
          properties:
            csrf_token:
              type: string
              description: Aktueller csrf_token-Cookie-Wert, siehe LoginResponse.csrf_token.

    # ── SecPulse ──────────────────────────────────────────────────────────────

    Asset:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        type:
          type: string
          enum: [web_app, server, database, container, repo]
        target:
          type: string
        criticality:
          type: string
          enum: [low, medium, high, critical]
        tags:
          type: array
          items:
            type: string
        environment:
          type: string
          enum: [prod, staging, dev]
        created_at:
          type: string
          format: date-time

    Certificate:
      type: object
      properties:
        id:
          type: string
          format: uuid
        org_id:
          type: string
          format: uuid
        domain:
          type: string
        issuer:
          type: string
        subject:
          type: string
        sans:
          type: array
          items:
            type: string
        not_before:
          type: string
          format: date-time
          nullable: true
        not_after:
          type: string
          format: date-time
          nullable: true
        asset_id:
          type: string
          format: uuid
          nullable: true
        source:
          type: string
          enum: [manual, scan]
        status:
          type: string
          enum: [valid, expiring, expired, error, unknown]
        last_checked_at:
          type: string
          format: date-time
          nullable: true
        error_msg:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateCertificateRequest:
      type: object
      required: [domain]
      properties:
        domain:
          type: string
          minLength: 1
          maxLength: 255
        asset_id:
          type: string
          format: uuid
          nullable: true
        source:
          type: string
          enum: [manual, scan]

    CreateAssetRequest:
      type: object
      required: [name, type, target, criticality]
      properties:
        name:
          type: string
        type:
          type: string
          enum: [web_app, server, database, container, repo]
        target:
          type: string
        criticality:
          type: string
          enum: [low, medium, high, critical]
        tags:
          type: array
          items:
            type: string

    Finding:
      type: object
      properties:
        id:
          type: string
          format: uuid
        asset_id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        severity:
          type: string
          enum: [info, low, medium, high, critical]
        status:
          type: string
          enum: [open, in_progress, resolved, accepted]
        cve:
          type: string
        cvss_score:
          type: number
        created_at:
          type: string
          format: date-time

    # ── SecVitals ─────────────────────────────────────────────────────────────

    Framework:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        total_controls:
          type: integer
        implemented_controls:
          type: integer
        score:
          type: number
        framework_variant:
          type: string
          enum: [full, simplified]
          description: "DORA framework variant — 'full' (Art. 5–15) or 'simplified' (Art. 16). Ignored for non-DORA frameworks."
        catalog_edition:
          type: string
          description: "Edition of the embedded control catalog (e.g. '2023' for BSI IT-Grundschutz Kompendium). Omitted for frameworks without a versioned catalog."

    Control:
      type: object
      properties:
        id:
          type: string
          format: uuid
        framework_id:
          type: string
          format: uuid
        code:
          type: string
        title:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [not_started, in_progress, implemented, not_applicable]
        responsible:
          type: string
        due_date:
          type: string
          format: date

    Risk:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        likelihood:
          type: integer
          minimum: 1
          maximum: 5
        impact:
          type: integer
          minimum: 1
          maximum: 5
        risk_score:
          type: integer
        status:
          type: string
          enum: [open, mitigated, accepted, closed]
        owner:
          type: string

    Incident:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        severity:
          type: string
          enum: [low, medium, high, critical]
        status:
          type: string
          enum: [open, investigating, contained, resolved]
        type:
          type: string
        created_at:
          type: string
          format: date-time

    # ── SecPrivacy ────────────────────────────────────────────────────────────

    VVTEntry:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        purpose:
          type: string
        legal_basis:
          type: string
        data_categories:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time

    Breach:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        severity:
          type: string
          enum: [low, medium, high, critical]
        status:
          type: string
        discovered_at:
          type: string
          format: date-time
        notified_authority_at:
          type: string
          format: date-time
          nullable: true

    # ── Webhooks ──────────────────────────────────────────────────────────────

    Webhook:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        url:
          type: string
          format: uri
        events:
          type: array
          items:
            type: string
        active:
          type: boolean
        last_triggered_at:
          type: string
          format: date-time
          nullable: true
        last_status_code:
          type: integer
          nullable: true

    # ── Notifications ─────────────────────────────────────────────────────────

    NotificationPreferences:
      type: object
      properties:
        email_findings:
          type: boolean
        email_incidents:
          type: boolean
        email_control_due:
          type: boolean
        email_weekly_digest:
          type: boolean
        inapp_findings:
          type: boolean
        inapp_incidents:
          type: boolean
        inapp_control_due:
          type: boolean

    # ── HR ────────────────────────────────────────────────────────────────────

    Employee:
      type: object
      properties:
        id:
          type: string
          format: uuid
        org_id:
          type: string
          format: uuid
        first_name:
          type: string
        last_name:
          type: string
        email:
          type: string
          format: email
        department:
          type: string
        role:
          type: string
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        status:
          type: string
          enum: [active, offboarding, terminated]
        notes:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateEmployeeInput:
      type: object
      required: [first_name, last_name, email]
      properties:
        first_name:
          type: string
        last_name:
          type: string
        email:
          type: string
          format: email
        department:
          type: string
        role:
          type: string
        start_date:
          type: string
          format: date
        notes:
          type: string

    UpdateEmployeeInput:
      type: object
      required: [first_name, last_name, status]
      properties:
        first_name:
          type: string
        last_name:
          type: string
        department:
          type: string
        role:
          type: string
        end_date:
          type: string
          format: date
        status:
          type: string
          enum: [active, offboarding, terminated]
        notes:
          type: string

    ChecklistItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        label:
          type: string
        required:
          type: boolean

    Checklist:
      type: object
      properties:
        id:
          type: string
          format: uuid
        org_id:
          type: string
          format: uuid
        type:
          type: string
          enum: [onboarding, offboarding]
        name:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/ChecklistItem'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateChecklistInput:
      type: object
      required: [type, name]
      properties:
        type:
          type: string
          enum: [onboarding, offboarding]
        name:
          type: string
          maxLength: 255
        items:
          type: array
          items:
            $ref: '#/components/schemas/ChecklistItem'

    ChecklistRun:
      type: object
      properties:
        id:
          type: string
          format: uuid
        org_id:
          type: string
          format: uuid
        employee_id:
          type: string
          format: uuid
        checklist_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [in_progress, completed]
        completed_items:
          type: array
          items:
            type: string
            format: uuid
        started_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    StartChecklistRunInput:
      type: object
      required: [employee_id, checklist_id]
      properties:
        employee_id:
          type: string
          format: uuid
        checklist_id:
          type: string
          format: uuid

    UpdateChecklistRunInput:
      type: object
      required: [status]
      properties:
        completed_items:
          type: array
          items:
            type: string
            format: uuid
        status:
          type: string
          enum: [in_progress, completed]

    # ── SecReflex ─────────────────────────────────────────────────────────────

    PhishingTemplate:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        subject:
          type: string
        from_name:
          type: string
        from_email:
          type: string
        html_body:
          type: string
          description: HTML body of the phishing email
        attack_type:
          type: string
        category:
          type: string
        difficulty:
          type: string
          enum: [easy, medium, hard]
        language:
          type: string
        placeholders:
          type: array
          items:
            type: string
        is_preset:
          type: boolean
        created_at:
          type: string
          format: date-time

    EnrollmentRule:
      type: object
      properties:
        id:
          type: string
          format: uuid
        org_id:
          type: string
          format: uuid
        name:
          type: string
        trigger_type:
          type: string
          enum: [new_employee, phishing_click]
        target_campaign_id:
          type: string
          format: uuid
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    TrainingMatrixReport:
      type: object
      properties:
        period:
          type: object
          properties:
            from: {type: string, format: date-time}
            to: {type: string, format: date-time}
        org_name:
          type: string
        campaigns:
          type: array
          items:
            type: object
            properties:
              id: {type: string}
              name: {type: string}
              recipient_count: {type: integer}
              click_rate: {type: number}
              started_at: {type: string}
              completed_at: {type: string}
        total_stats:
          type: object
          properties:
            total_campaigns: {type: integer}
            total_participants: {type: integer}
            avg_click_rate: {type: number}
            total_trainings_completed: {type: integer}
        bsi_compliance:
          $ref: '#/components/schemas/BSIOrp3Compliance'
        generated_at:
          type: string
          format: date-time

    BSIOrp3Compliance:
      type: object
      properties:
        fulfilled_count:
          type: integer
        total_count:
          type: integer
        requirements:
          type: array
          items:
            type: object
            properties:
              id: {type: string}
              title: {type: string}
              fulfilled: {type: boolean}
              evidence_ids:
                type: array
                items:
                  type: string

    CreateTemplateInput:
      type: object
      required: [name, subject, body]
      properties:
        name:
          type: string
        subject:
          type: string
        body:
          type: string

    TargetGroup:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        source:
          type: string
        target_count:
          type: integer
        created_at:
          type: string
          format: date-time

    Target:
      type: object
      properties:
        id:
          type: string
          format: uuid
        group_id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        first_name:
          type: string
        last_name:
          type: string

    LandingPage:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        html:
          type: string
        created_at:
          type: string
          format: date-time

    Campaign:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        status:
          type: string
          enum: [draft, running, completed, aborted]
        template_id:
          type: string
          format: uuid
        group_id:
          type: string
          format: uuid
        landing_page_id:
          type: string
          format: uuid
        track_opens:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateCampaignInput:
      type: object
      required: [name, template_id, group_id]
      properties:
        name:
          type: string
        template_id:
          type: string
          format: uuid
        group_id:
          type: string
          format: uuid
        landing_page_id:
          type: string
          format: uuid
        track_opens:
          type: boolean
          default: true

    CampaignStats:
      type: object
      description: |
        Aggregated metrics for one phishing campaign.

        This schema used to describe fields the handler has never returned
        (`sent`, `opened`, `clicked`, `submitted`, `reported`) — it was written
        against an API that did not exist, and the frontend types generated from it
        were fiction. Corrected against the handler (S126 follow-up).
      properties:
        total_targets:
          type: integer
          description: Everyone the campaign was aimed at — the denominator of all three rates.
        emails_sent:
          type: integer
          description: Mails handed to the transport (count of `sent` events).
        opens:
          type: integer
        clicks:
          type: integer
        form_submissions:
          type: integer
        open_rate:
          type: number
          format: float
          description: PERCENTAGE (0–100), not a fraction.
        click_rate:
          type: number
          format: float
          description: PERCENTAGE (0–100), not a fraction.
        submission_rate:
          type: number
          format: float
          description: PERCENTAGE (0–100), not a fraction.
        tracking_measured:
          type: boolean
          description: |
            False for campaigns sent before migration 242: their tracking tokens were
            never stored, so every click was rejected and nothing was recorded. Their
            zeroes are the absence of measurement, not a measurement of zero — and in a
            bar chart the two look the same.
      required:
        [total_targets, emails_sent, opens, clicks, form_submissions,
         open_rate, click_rate, submission_rate, tracking_measured]

    TrainingModule:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        duration_minutes:
          type: integer
        assigned_count:
          type: integer
        completed_count:
          type: integer
        created_at:
          type: string
          format: date-time

    TrainingAssignment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        module_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [assigned, completed]
        assigned_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time

    AssignmentDetail:
      type: object
      description: Per-target assignment detail for a single training module (email + completion outcome joined in).
      properties:
