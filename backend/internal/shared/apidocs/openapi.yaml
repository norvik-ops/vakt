  /auth/2fa/login-verify:
    post:
      summary: Second stage of the two-stage login — exchange the mfa_pending token plus a TOTP or backup
        code for a full session
      tags:
      - auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - mfa_token
              properties:
                mfa_token:
                  type: string
                  description: Short-lived mfa_pending token returned by POST /auth/login.
                code:
                  type: string
                  description: Current TOTP code. Either code or backup_code must be present.
                backup_code:
                  type: string
                  description: One-time backup code. Either code or backup_code must be present.
      responses:
        '200':
          description: Session issued (access_token cookie and csrf_token cookie are also set)
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                  refresh_token:
                    type: string
                  expires_in:
                    type: integer
                  user:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      email:
                        type: string
                        format: email
                      display_name:
                        type: string
                      roles:
                        type: array
                        items:
                          type: string
                  session_id:
                    type: string
                    format: uuid
                  csrf_token:
                    type: string
                  mfa_required:
                    type: boolean
                  mfa_token:
                    type: string
        '400':
          description: mfa_token missing, or neither code nor backup_code supplied
        '401':
          description: Invalid or expired MFA session — log in again
        '422':
          description: Invalid TOTP or backup code

  /auth/oidc/callback:
    post:
      summary: Complete the OIDC/OAuth2 login flow (SSO Pro feature)
      tags:
      - auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - code
              - state
              - provider
              properties:
                code:
                  type: string
                state:
                  type: string
                provider:
                  type: string
                  enum:
                  - google
                  - github
                  - keycloak
      responses:
        '200':
          description: Session issued (access_token cookie and csrf_token cookie are also set)
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                  refresh_token:
                    type: string
                  expires_in:
                    type: integer
                  user:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      email:
                        type: string
                        format: email
                      display_name:
                        type: string
                      roles:
                        type: array
                        items:
                          type: string
                  session_id:
                    type: string
                    format: uuid
                  csrf_token:
                    type: string
        '400':
          description: Invalid request body or invalid state parameter
        '402':
          description: Feature not available — SSO requires Vakt Pro
        '422':
          description: Validation error
        '501':
          description: OIDC not configured (CASDOOR_URL unset)

  /auth/saml/acs:
    post:
      summary: SAML assertion consumer service — consumes the IdP's SAMLResponse and issues a session
      tags:
      - auth
      security: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                SAMLResponse:
                  type: string
                  description: Base64-encoded SAML response, POSTed by the IdP (direct SP path).
                RelayState:
                  type: string
          application/json:
            schema:
              type: object
              required:
              - saml_response
              properties:
                saml_response:
                  type: string
                relay_state:
                  type: string
      responses:
        '200':
          description: Session issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                  refresh_token:
                    type: string
                  expires_in:
                    type: integer
                  user:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      email:
                        type: string
                        format: email
                      display_name:
                        type: string
                      roles:
                        type: array
                        items:
                          type: string
                  session_id:
                    type: string
                    format: uuid
                  csrf_token:
                    type: string
        '302':
          description: Assertion invalid, e-mail missing, or user not provisioned — redirect to /login?error=...
            (direct SP path only)
        '400':
          description: Invalid form data or invalid request body
        '402':
          description: Feature not available — SAML requires Vakt Pro
        '422':
          description: Validation error (Casdoor fallback path)
        '500':
          description: SAML SP configuration error
        '501':
          description: SAML not configured (Casdoor fallback, CASDOOR_URL unset)

  /auth/saml/callback:
    post:
      summary: SAML login via the Casdoor proxy — exchange a SAML response for a session
      tags:
      - auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - saml_response
              properties:
                saml_response:
                  type: string
                relay_state:
                  type: string
      responses:
        '200':
          description: Session issued (access_token cookie and csrf_token cookie are also set)
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                  refresh_token:
                    type: string
                  expires_in:
                    type: integer
                  user:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      email:
                        type: string
                        format: email
                      display_name:
                        type: string
                      roles:
                        type: array
                        items:
                          type: string
                  session_id:
                    type: string
                    format: uuid
                  csrf_token:
                    type: string
        '400':
          description: Invalid request body
