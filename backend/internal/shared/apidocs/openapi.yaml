  /system/update:
    get:
      summary: Get update check status
      tags: [admin]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateInfo'
    put:
      summary: Enable or disable automatic update checks (Admin only, persisted in Redis)
      tags: [admin]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [enabled]
              properties:
                enabled:
                  type: boolean
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateInfo'
        '400':
          description: Bad request
        '403':
          description: Forbidden — Admin role required
