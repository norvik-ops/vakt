  # ── S105: Auth & User Provisioning ──────────────────────────────────────────

  /admin/users:
    post:
      summary: Create a user directly (no SMTP required)
      operationId: createUser
      description: Creates an active user in the org without an email invitation. CE feature — no feature gate.
      tags: [admin]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, role]
              properties:
                email: { type: string, format: email }
                password: { type: string, minLength: 10 }
                role:
                  type: string
                  enum: [Admin, SecurityAnalyst, Viewer, AuditorReadOnly]
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                type: object
                required: [user_id, email, role]
                properties:
                  user_id: { type: string, format: uuid }
                  email: { type: string }
                  role: { type: string }
        '401':
          description: Unauthorized
        '409':
          description: Email already in use
        '422':
          description: Validation error
    get:
      summary: List organisation members with their roles
      tags:
      - admin
      responses:
        '200':
          description: Organisation members
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                      format: uuid
                    email:
                      type: string
                      format: email
                    name:
                      type: string
                    role:
                      type: string
                    created_at:
                      type: string
                      format: date-time
        '401':
          description: Unauthorized
        '403':
          description: Admin role required

  /admin/org:
    put:
      summary: Update org branding
      operationId: updateOrgBranding
      tags: [admin]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [logo_url]
              properties:
                logo_url: { type: string }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
        '401':
          description: Unauthorized
    get:
      summary: Get the caller's own organisation (incl. trust center settings)
      tags:
      - admin
      responses:
        '200':
          description: Organisation
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      name:
                        type: string
                      slug:
                        type: string
                      trust_center_enabled:
                        type: boolean
                      trust_center_description:
                        type: string
                      trust_center_contact:
                        type: string
                      require_mfa:
                        type: boolean
        '401':
          description: Unauthorized
        '403':
          description: Admin role or IP allowlist required

