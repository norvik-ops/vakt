      tags:
      - vaktprivacy
      responses:
        '200':
          description: 'CSV with header row:

            id, type, requester_name, requester_email, status, received_at, due_date, completed_at

            '
          content:
            text/csv:
              schema:
                type: string
        '401':
          description: Unauthorized

