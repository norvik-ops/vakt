          description: DSR not found

  /vaktprivacy/dsr-portal/{slug}/info:
    get:
      summary: Get public DSR portal metadata for an organisation slug
      description: Public endpoint — no authentication required.
      tags:
      - vaktprivacy
      security: []
      parameters:
      - name: slug
        in: path
        required: true
        description: Organisation portal slug (not a UUID)
        schema:
          type: string
      responses:
        '200':
          description: Portal metadata
          content:
            application/json:
              schema:
                type: object
                properties:
                  org_name:
                    type: string
                  slug:
                    type: string
                  intro:
                    type: string
                  enabled:
                    type: boolean
        '404':
          description: Portal not found or not enabled

  /vaktprivacy/dsr-portal/{slug}/submit:
    post:
      summary: Submit a data subject request via the public portal
      description: Public endpoint — no authentication required. IP rate-limited.
      tags:
      - vaktprivacy
      security: []
      parameters:
      - name: slug
        in: path
        required: true
        description: Organisation portal slug (not a UUID)
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - type
              - first_name
              - last_name
              - email
              properties:
                type:
                  type: string
                  enum:
                  - access
                  - deletion
                  - correction
                  - objection
                first_name:
                  type: string
                last_name:
                  type: string
                email:
                  type: string
                  format: email
                description:
                  type: string
                  maxLength: 10000
                locale:
                  type: string
      responses:
        '201':
          description: Request accepted — returns the raw status token (shown once)
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
        '400':
          description: Invalid request body, or the portal is disabled / slug unknown
        '422':
          description: Validation error

