    get:
      summary: List SoA versions
      tags: [vaktcomply]
      responses:
        '200':
          description: All SoA versions

  /vaktcomply/soa/summary:
    get:
      summary: Get SoA summary (total, applicable, excluded, version status)
      tags: [vaktcomply]
      responses:
        '200':
          description: SoA summary

  /vaktcomply/soa/export:
    get:
