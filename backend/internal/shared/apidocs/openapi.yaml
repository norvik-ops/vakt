      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                not_applicable:
                  type: boolean
                reason:
                  type: string
                manual_status:
                  type: string
                  enum:
                  - in_progress
                  - implemented
                maturity_score:
                  type: integer
                  minimum: 0
                  maximum: 3
                  nullable: true
                owner:
                  type: string
                  maxLength: 200
                due_date:
                  type: string
                  format: date
                  nullable: true
      responses:
        '200':
          description: Updated control
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  framework_id:
                    type: string
                    format: uuid
                  org_id:
                    type: string
                    format: uuid
                  control_id:
                    type: string
                  title:
                    type: string
                  description:
                    type: string
                  domain:
                    type: string
                  evidence_type:
                    type: string
                  weight:
                    type: integer
                  evidence_count:
                    type: integer
                  status:
                    type: string
                  not_applicable:
                    type: boolean
                  not_applicable_reason:
                    type: string
                  manual_status:
                    type: string
                  iso27001_mapping:
                    type: string
                  maturity_score:
                    type: integer
                  owner:
                    type: string
                  last_reviewed_at:
                    type: string
                    format: date-time
                    nullable: true
                  review_interval_days:
                    type: integer
                  next_review_due:
                    type: string
                    format: date-time
                    nullable: true
                  last_reviewed_by:
                    type: string
                  review_note:
                    type: string
