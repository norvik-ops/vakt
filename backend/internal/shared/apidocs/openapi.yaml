  /vaktscan/findings/bulk:
    get:
      summary: List findings (alias of GET /vaktscan/findings)
      description: 'Same handler as GET /vaktscan/findings. Cursor pagination by default; passing page switches
        to the deprecated offset mode, whose pagination object carries page/limit/total/total_pages instead
        of the cursor fields.

        '
      tags:
      - vaktscan
      parameters:
      - $ref: '#/components/parameters/PageParam'
      - $ref: '#/components/parameters/LimitParam'
      - name: cursor
        in: query
        description: Opaque cursor from a previous response (cursor mode only)
        schema:
          type: string
      - name: severity
        in: query
        schema:
          type: string
      - name: status
        in: query
        schema:
          type: string
      - name: asset_id
        in: query
        schema:
          type: string
          format: uuid
      - name: sort
        in: query
        schema:
          type: string
      - name: order
        in: query
        schema:
          type: string
      responses:
        '200':
          description: Findings with pagination metadata
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                        org_id:
                          type: string
                          format: uuid
                        asset_id:
                          type: string
                          format: uuid
                        scan_id:
                          type: string
                          format: uuid
                          nullable: true
                        cve_id:
                          type: string
                          nullable: true
                        title:
                          type: string
                        description:
                          type: string
                        severity:
                          type: string
                        cvss_score:
                          type: number
                          nullable: true
                        epss_score:
                          type: number
                          nullable: true
                        epss_percentile:
                          type: number
                          nullable: true
                        risk_score:
                          type: number
                          nullable: true
                        status:
                          type: string
                        scanner:
                          type: string
                        raw_id:
                          type: string
                        sources:
                          type: array
                          items:
                            type: string
                        template_id:
                          type: string
                        assigned_to:
                          type: string
                          nullable: true
                        justification:
                          type: string
                        reopen_count:
                          type: integer
                        occurrence_count:
                          type: integer
                        last_seen_at:
                          type: string
                          format: date-time
                        sla_due_at:
                          type: string
                          format: date-time
                          nullable: true
                        created_at:
                          type: string
                          format: date-time
                        updated_at:
                          type: string
                          format: date-time
                  pagination:
                    type: object
                    description: Cursor metadata in cursor mode; offset metadata (page, limit, total, total_pages)
                      when page is passed.
                    properties:
                      limit:
                        type: integer
                      next_cursor:
                        type: string
                      has_more:
                        type: boolean
                required:
                - data
                - pagination
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - role not permitted
    post:
      summary: Bulk-update findings
      tags:
      - vaktscan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ids:
                  type: array
                  minItems: 1
                  items:
                    type: string
                    format: uuid
                status:
                  type: string
                  enum:
                  - open
                  - in_progress
                  - resolved
                  - accepted_risk
                  - false_positive
                assigned_to:
                  type: string
                  nullable: true
              required:
              - ids
      responses:
        '200':
          description: Number of updated findings
          content:
            application/json:
              schema:
                type: object
                properties:
                  updated:
                    type: integer
                required:
                - updated
        '400':
          description: Invalid request body
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - role not permitted
        '422':
          description: Validation error

