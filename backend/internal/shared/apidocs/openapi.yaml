    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    post:
      summary: Start an offboarding run — also sets employee.status to "offboarding"
      tags: [hr]
      responses:
        '201':
          description: Offboarding run started
        '400':
          description: No offboarding checklist available

