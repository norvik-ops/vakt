      tags: [vaktcomply]
      responses:
        '200':
          description: All audits in the program
    post:
      summary: Create audit program audit
      tags: [vaktcomply]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, audit_type]
              properties:
                title: { type: string }
                audit_type: { type: string, enum: [isms_internal, compliance_check, supplier_audit, process_audit, follow_up] }
                scheduled_date: { type: string, format: date }
                lead_auditor: { type: string }
                plan_id: { type: string, format: uuid }
      responses:
        '201':
          description: Created audit

  /vaktcomply/audit-program/summary:
    get:
      summary: Get audit program summary statistics
      tags: [vaktcomply]
      responses:
        '200':
          description: Audit program summary

  /vaktcomply/audit-program/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      summary: Get audit program audit
      tags: [vaktcomply]
      responses:
        '200':
          description: Audit detail
    put:
      summary: Update an audit in the audit program
      tags:
      - vaktcomply
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - title
              - audit_type
              - scope
              - planned_date
              properties:
                audit_plan_id:
                  type: string
                  format: uuid
                  nullable: true
                title:
                  type: string
                  maxLength: 300
                audit_type:
                  type: string
                  enum:
                  - isms_internal
                  - compliance_check
                  - supplier_audit
                  - process_audit
                scope:
                  type: string
                  maxLength: 5000
                methodology:
                  type: string
                  enum:
                  - document_review
                  - interview
                  - technical_check
                  - combined
                planned_date:
                  type: string
                  description: YYYY-MM-DD
                lead_auditor_id:
                  type: string
                  format: uuid
                  nullable: true
                auditor_ids:
                  type: array
                  items:
                    type: string
                    format: uuid
                supplier_id:
                  type: string
                  format: uuid
                  nullable: true
      responses:
        '200':
          description: Updated audit
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  org_id:
                    type: string
                    format: uuid
                  audit_plan_id:
                    type: string
                    format: uuid
                    nullable: true
                  title:
                    type: string
                  audit_type:
                    type: string
                  scope:
                    type: string
                  methodology:
                    type: string
                  planned_date:
                    type: string
                  actual_date:
                    type: string
                    nullable: true
                  lead_auditor_id:
                    type: string
                    format: uuid
                    nullable: true
                  auditor_ids:
                    type: array
                    items:
                      type: string
                  supplier_id:
                    type: string
                    format: uuid
                    nullable: true
                  status:
                    type: string
                  audit_report:
                    type: string
                  findings_count:
                    type: integer
                  created_at:
                    type: string
                  updated_at:
                    type: string
        '400':
          description: Invalid request body
        '401':
          description: Unauthorized
        '403':
          description: Forbidden — role Admin/SecurityAnalyst required
        '404':
          description: Audit not found
        '422':
          description: Validation failed

  /vaktcomply/audit-program/{id}/complete:
