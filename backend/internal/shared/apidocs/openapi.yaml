      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: SBOM summary plus component list
          content:
            application/json:
              schema:
                type: object
                properties:
                  sbom:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      asset_id:
                        type: string
                        format: uuid
                      format:
                        type: string
                      component_count:
                        type: integer
                      created_at:
                        type: string
                        format: date-time
                  components:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                        name:
                          type: string
                        version:
                          type: string
                        purl:
                          type: string
                        eol_status:
                          type: string
                        eol_date:
                          type: string
                          nullable: true
                        asset_id:
                          type: string
                          format: uuid
                required:
                - sbom
                - components
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - role not permitted or Pro licence (SecPulse) required
