      required: [id, org_id, vvt_id, control_id, created_at]
      properties:
        id: { type: string, format: uuid }
        org_id: { type: string, format: uuid }
        vvt_id: { type: string }
        vvt_name: { type: string }
        control_id: { type: string, format: uuid }
        created_at: { type: string, format: date-time }

    PhysicalControlTemplate:
      type: object
      required: [control_code, title, items]
      properties:
        control_code: { type: string }
        title: { type: string }
        items:
          type: array
          items: { type: string }

    VeriniceImportPreview:
      type: object
      required: [total_objects, assets, controls, risks, unmapped]
      properties:
        total_objects: { type: integer }
        assets: { type: integer }
        controls: { type: integer }
        risks: { type: integer }
        unmapped: { type: integer }
        unmapped_types: { type: array, items: { type: string } }
        sample_titles: { type: object, additionalProperties: true }

    ThreatCatalogItem:
      type: object
      required: [id, title, category, scenario, suggested_measure, default_likelihood, default_impact]
      properties:
        id: { type: string }
        title: { type: string }
        category: { type: string }
        asset_types: { type: array, items: { type: string } }
        cia: { type: array, items: { type: string } }
        frameworks: { type: array, items: { type: string } }
        scenario: { type: string }
        suggested_measure: { type: string }
        control_links: { type: array, items: { type: string } }
        default_likelihood: { type: integer }
        default_impact: { type: integer }

tags:
  - name: auth
    description: Authentication
  - name: vaktscan
    description: Vakt Scan — asset and vulnerability management
  - name: vaktcomply
    description: Vakt Comply — compliance frameworks and controls
  - name: vaktprivacy
    description: Vakt Privacy — GDPR documentation
  - name: vaktaware
    description: Vakt Aware — phishing simulations
  - name: vaktvault
    description: Vakt Vault — secrets management
  - name: integrations
    description: Cloud provider integrations — evidence collection
  - name: webhooks
    description: Outgoing webhook configuration
  - name: notifications
    description: Notification preferences
  - name: hr
    description: Vakt HR — employee lifecycle and onboarding/offboarding checklists
  - name: admin
    description: Administration endpoints

paths:
  # ── Health ────────────────────────────────────────────────────────────────
  /health:
    get:
      summary: Liveness check + Frontend-Feature-Flags
      description: |
        Antwortet, solange der Prozess läuft. Frontend nutzt diesen Endpoint
        (siehe useDemoMode, Login.tsx) zur Feature-Detection:
        - `demo` schaltet die Login-Page in den Ephemeral-Demo-Flow
        - `sso_enabled` blendet den SSO-Button ein
        - `version` wird im Footer angezeigt
      tags: [admin]
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [status, version, demo, sso_enabled]
                properties:
                  status:
                    type: string
                    enum: [ok]
                  version:
                    type: string
                    example: "0.6.2"
                  demo:
                    type: boolean
                    description: VAKT_DEMO=true → ephemerer Demo-Flow aktiv
                  sso_enabled:
                    type: boolean
                    description: OIDC/SAML konfiguriert

  /health/ready:
    get:
      summary: Readiness check (DB + Redis)
      tags: [admin]
      security: []
      responses:
        '200':
          description: Ready
        '503':
          description: Not ready

  # ── Demo ──────────────────────────────────────────────────────────────────
  /demo/start:
    post:
      summary: Start an ephemeral demo session (returns one-time credentials)
      description: |
        Only registered when `VAKT_DEMO=true`. Each call creates a fresh, isolated
        demo organisation with a random slug and two seed accounts (admin +
        analyst). The cleartext passwords are returned **once**; the database
        stores only bcrypt hashes. An Asynq cleanup job purges ephemeral orgs
        after 4 hours.

        Rate-limited to 10 req/min per IP (burst 10, 5-minute reset window) to
        prevent abuse of the public demo deployment. Repeated calls beyond the
        limit return `429 rate limit exceeded`.
      tags: [admin]
      security: []
      responses:
        '200':
          description: New ephemeral demo session
          content:
            application/json:
              schema:
                type: object
                required:
                  - admin_email
                  - admin_password
                  - analyst_email
                  - analyst_password
                  - expires_in
                properties:
                  admin_email:
                    type: string
                    format: email
                    example: "admin@demo-a3f2b1c9.demo"
                  admin_password:
                    type: string
                    description: Cleartext password, returned exactly once.
                    example: "f4a9b7e2c1d80356"
                  analyst_email:
                    type: string
                    format: email
                    example: "analyst@demo-a3f2b1c9.demo"
                  analyst_password:
                    type: string
                    description: Cleartext password, returned exactly once.
                    example: "1e7c2bd930f48a16"
                  expires_in:
                    type: integer
                    description: Lifetime of the demo org in seconds (currently 14400 = 4 h).
                    example: 14400
        '429':
          description: Rate limit exceeded (10 req/min per IP).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Demo seed failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /demo/login:
    post:
      summary: Start an ephemeral demo session and log in server-side
      description: |
        Like `/demo/start`, but the random password is consumed internally and
        never returned to the client. The server creates the ephemeral org,
        runs the real login flow with the role's seed user, and returns the
        standard `LoginResponse` (with httpOnly `access_token` cookie set).

        Use this from any UI that would otherwise display the demo password
        in the DOM (audit F041).

        Rate-limited together with `/demo/start` (10/min per IP).
      tags: [admin]
      security: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                role:
                  type: string
                  enum: [admin, analyst]
                  description: Which seed account to log in as. Defaults to admin.
                  example: admin
      responses:
        '200':
          description: Successful demo login
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '429':
          description: Rate limit exceeded (10 req/min per IP).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Demo seed or login failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '503':
          description: Demo login not configured on this instance.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ── Auth ──────────────────────────────────────────────────────────────────
  /auth/login:
    post:
      summary: Log in and obtain a Paseto token
      tags: [auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Successful login
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Too many requests

  /auth/register:
    post:
      summary: Register a new account
      tags: [auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, name]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 10
                name:
                  type: string
      responses:
        '201':
          description: Account created
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/password-reset/request:
    post:
      summary: Request a password-reset e-mail
      tags: [auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Reset e-mail sent (always 200 to prevent user enumeration)

  /auth/password-reset/confirm:
    post:
      summary: Set a new password using a reset token
      tags: [auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, password]
              properties:
                token:
                  type: string
                password:
                  type: string
                  minLength: 10
      responses:
        '200':
          description: Password updated
        '400':
          description: Invalid or expired token

  /auth/refresh:
    post:
      summary: Refresh an access token using a refresh token
      tags: [auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: New token pair
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshResponse'
        '401':
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/me:
    get:
      summary: Return the authenticated user's identity for client-side rehydration
      description: |
        Replaces the previous localStorage-based user snapshot in the SPA
        (audit F032 — no PII in localStorage). The cookie/Paseto session is
        the source of truth; this endpoint just lets the front-end ask
        "who am I?" after a page reload.
      tags: [auth]
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthMeResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/logout:
    post:
      summary: Invalidate the current access token
      tags: [auth]
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: logged out

  # ── Auth — Sessions ───────────────────────────────────────────────────────
  /auth/sessions:
    get:
      summary: List active sessions for the current user
      tags: [auth]
      responses:
        '200':
          description: Active sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SessionInfo'
    delete:
      summary: Revoke all other sessions (keep current)
      tags: [auth]
      responses:
        '200':
          description: Other sessions revoked
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: other sessions revoked

  /auth/sessions/{id}:
    delete:
      summary: Revoke a specific session
      tags: [auth]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Session revoked
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
        '404':
          description: Session not found

  # ── Auth — TOTP / 2FA ─────────────────────────────────────────────────────
  /auth/2fa/status:
    get:
      summary: Check whether 2FA is enabled for the current user
      tags: [auth]
      responses:
        '200':
          description: 2FA status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TOTPStatusResponse'

  /auth/2fa/setup:
    post:
      summary: Begin TOTP setup — returns secret and QR URI
      tags: [auth]
      responses:
        '200':
          description: TOTP secret and URI
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TOTPSetupResponse'
        '409':
          description: 2FA already enabled

  /auth/2fa/confirm:
    post:
      summary: Confirm TOTP setup with first code — activates 2FA and returns backup/recovery codes
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TOTPConfirmRequest'
      responses:
        '200':
          description: 2FA activated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TOTPConfirmResponse'
        '409':
          description: 2FA already enabled
        '422':
          description: Invalid TOTP code

  /auth/2fa/disable:
    post:
      summary: Disable 2FA (requires valid TOTP code)
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TOTPCodeRequest'
      responses:
        '200':
          description: 2FA disabled
        '422':
          description: Invalid TOTP code

  /auth/2fa/verify:
    post:
      summary: Verify a TOTP code or backup code (second-factor step after login)
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TOTPVerifyRequest'
      responses:
        '200':
          description: Verified
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: verified
        '422':
          description: Invalid code

  /auth/2fa/recovery:
    post:
      summary: Use a recovery code to obtain a new token pair (bypasses TOTP)
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TOTPRecoveryRequest'
      responses:
        '200':
          description: New token pair issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshResponse'
        '422':
          description: Invalid or already-used recovery code

  /auth/2fa/recovery-codes/regenerate:
    post:
      summary: Invalidate existing recovery codes and issue 8 new ones
      tags: [auth]
      responses:
        '200':
          description: New recovery codes
          content:
            application/json:
              schema:
                type: object
                properties:
                  recovery_codes:
                    type: array
                    items:
                      type: string
        '400':
          description: 2FA not enabled

  /auth/oidc/initiate:
    get:
      summary: Initiate OIDC/OAuth2 login flow via Casdoor (SSO Pro feature)
      tags: [auth]
      parameters:
        - name: provider
          in: query
          required: true
          schema:
            type: string
          description: OIDC provider name as configured in Casdoor
      responses:
        '200':
          description: State and Casdoor redirect URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  state:
                    type: string
                  redirect_url:
                    type: string
                    format: uri
        '501':
          description: OIDC not configured

  # ── SecPulse — Assets ─────────────────────────────────────────────────────
  /vaktscan/assets:
    get:
      summary: List assets
      tags: [vaktscan]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Paginated asset list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Asset'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
    post:
      summary: Create an asset
      tags: [vaktscan]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAssetRequest'
      responses:
        '201':
          description: Asset created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Asset'
        '400':
          description: Validation error

  /vaktscan/assets/{id}:
    get:
      summary: Get an asset
      tags: [vaktscan]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Asset
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Asset'
        '404':
          description: Not found
    put:
      summary: Update an asset
      tags: [vaktscan]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAssetRequest'
      responses:
        '200':
          description: Updated asset
    delete:
      summary: Delete an asset
      tags: [vaktscan]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Deleted

  /vaktscan/assets/import/csv:
    post:
      summary: Bulk-import assets from CSV
      tags: [vaktscan]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Import result
          content:
            application/json:
              schema:
                type: object
                properties:
                  inserted:
                    type: integer
                  errored:
                    type: integer
                  errors:
                    type: array
                    items:
                      type: string

  # ── SecPulse — Findings ───────────────────────────────────────────────────
  /vaktscan/findings:
    get:
      summary: List findings
      tags: [vaktscan]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: asset_id
          in: query
          schema:
            type: string
            format: uuid
        - name: severity
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Paginated findings
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Finding'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '401': { description: Unauthorized }

  /vaktscan/findings/{id}:
    get:
      summary: Get a finding
      tags: [vaktscan]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Finding
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Finding'
    patch:
      summary: Update a finding (status, severity, assignee)
      tags: [vaktscan]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                severity:
                  type: string
                assignee:
                  type: string
      responses:
        '200':
          description: Updated finding
    delete:
      summary: Delete a finding
      tags: [vaktscan]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Deleted
        '404':
          description: Finding not found

  # ── SecPulse — TLS Certificate Tracking ──────────────────────────────────

  /vaktscan/certificates:
    get:
      summary: List tracked TLS certificates
      tags: [vaktscan]
      responses:
        '200':
          description: Certificate list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Certificate'
    post:
      summary: Add a domain certificate to track
      tags: [vaktscan]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCertificateRequest'
      responses:
        '201':
          description: Certificate created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Certificate'
        '422':
          description: Validation error

  /vaktscan/certificates/{id}:
    get:
      summary: Get a tracked certificate
      tags: [vaktscan]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Certificate
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Certificate'
        '404':
          description: Not found
    delete:
      summary: Remove a tracked certificate
      tags: [vaktscan]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Deleted
        '404':
          description: Not found

  /vaktscan/certificates/{id}/scan:
    post:
      summary: Trigger a manual TLS rescan for a certificate
      tags: [vaktscan]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Updated certificate after scan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Certificate'
        '404':
          description: Not found

  # ── SecVitals — Frameworks ────────────────────────────────────────────────
  /vaktcomply/frameworks:
    get:
      summary: List installed frameworks
      tags: [vaktcomply]
      responses:
        '200':
          description: Framework list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Framework'
        '401': { description: Unauthorized }

  /vaktcomply/frameworks/{id}:
    get:
      summary: Get a framework with score
      tags: [vaktcomply]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Framework detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Framework'
    delete:
      summary: Remove a framework
      tags: [vaktcomply]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Removed

  /vaktcomply/frameworks/{name}/enable:
    post:
      summary: Enable a framework by slug (e.g. ISO27001, NIS2, DORA, TISAX)
      tags: [vaktcomply]
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                variant:
                  type: string
                  enum: [full, simplified]
                  description: "For DORA only — 'full' (Art. 5–15, default) or 'simplified' (Art. 16)"
      responses:
        '201':
          description: Framework enabled

  /vaktcomply/frameworks/dora/variant:
    put:
      summary: Switch the enabled DORA framework between full (Art. 5–15) and simplified (Art. 16) variant
      tags: [vaktcomply]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [variant]
              properties:
                variant:
                  type: string
                  enum: [full, simplified]
      responses:
        '200':
          description: DORA framework updated with new variant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Framework'
        '404':
          description: DORA framework not enabled for this organisation

  /vaktcomply/frameworks/{id}/controls:
    get:
      summary: List controls for a framework
      tags: [vaktcomply]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Controls
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Control'
