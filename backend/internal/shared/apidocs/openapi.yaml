  # ── SecVitals — Policies ──────────────────────────────────────────────────

  # ── Vakt Comply — Policy templates (S128-1 / D15) ────────────────────────
  #
  # Two distinct template surfaces, both live and both consumed by the frontend,
  # neither of which was in this spec:
  #   /policy-templates  — the built-in, compiled-in German starter templates
  #   /templates         — the DB-backed template library (ck_policy_templates)

  /vaktcomply/policy-templates:
    get:
      summary: List built-in policy templates
      description: |
        The compiled-in German starter templates. These are not org-scoped and not
        editable — applying one creates a policy from its content.
      tags: [vaktcomply]
      responses:
        '200':
          description: Built-in templates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BuiltinPolicyTemplate'
        '401': { description: Unauthorized }

  /vaktcomply/policy-templates/{id}/apply:
    post:
      summary: Create a policy from a built-in template
      tags: [vaktcomply]
      parameters:
        - name: id
          in: path
          required: true
          description: Built-in template id (a slug such as `isms-policy`, not a UUID).
          schema:
            type: string
      responses:
        '201':
          description: The created policy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Policy'
        '401': { description: Unauthorized }
        '404': { description: Template not found }

  /vaktcomply/templates:
    get:
      summary: List DB-backed compliance templates
      tags: [vaktcomply]
      parameters:
        - name: category
          in: query
          required: false
          description: Filter by category. Omit for all.
          schema:
            type: string
            enum: [policy, dpia, avv]
      responses:
        '200':
          description: Templates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PolicyTemplate'
        '400': { description: Invalid category }
        '401': { description: Unauthorized }

  /vaktcomply/templates/{id}:
    get:
      summary: Get a DB-backed compliance template
      tags: [vaktcomply]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: The template
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PolicyTemplate'
        '401': { description: Unauthorized }
        '404': { description: Template not found }

  /vaktcomply/policies:
    get:
      summary: List policies
      tags:
      - vaktcomply
      responses:
        '200':
          description: List of policies
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                        title:
                          type: string
                        status:
                          type: string
                          enum:
                          - draft
                          - active
                          - archived
                        version:
                          type: integer
                        owner:
                          type: string
                        review_date:
                          type: string
                          format: date
                        created_at:
                          type: string
                          format: date-time
                  pagination:
                    $ref: '#/components/schemas/PaginationMeta'
                required:
                - data
                - pagination
    post:
      summary: Create policy
      tags:
      - vaktcomply
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - title
              - content
              properties:
                title:
                  type: string
                content:
                  type: string
                owner:
                  type: string
                review_interval_days:
                  type: integer
      responses:
        '201':
          description: Created policy

  /vaktcomply/policies/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      summary: Get policy
