          description: Scan enqueued
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  org_id:
                    type: string
                    format: uuid
                  asset_id:
                    type: string
                    format: uuid
                  scanner:
                    type: string
                  status:
                    type: string
                  target_url:
                    type: string
                  target_ip:
                    type: string
                  error_message:
                    type: string
                  finding_count:
                    type: integer
                  duration_ms:
                    type: integer
                    format: int64
                    nullable: true
                  started_at:
                    type: string
                    format: date-time
                    nullable: true
                  completed_at:
                    type: string
                    format: date-time
                    nullable: true
                  created_at:
                    type: string
                    format: date-time
        '400':
          description: Invalid request body
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - role not permitted
        '422':
          description: Validation error

  /vaktscan/assets/{id}/schedules:
