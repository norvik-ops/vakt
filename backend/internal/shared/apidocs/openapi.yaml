                    type: boolean
                  due_date:
                    type: string
                    format: date-time
                    nullable: true
                  evidence_status:
                    type: string
                  evidence_max_age_days:
                    type: integer
                    nullable: true
                  evidence_expires_at:
                    type: string
                    format: date-time
                    nullable: true
                  regulation_source:
                    type: string
                  thematic_area:
                    type: string
                  applicability_scope:
                    type: array
                    items:
                      type: string
        '400':
          description: Invalid request body
        '401':
          description: Unauthorized
        '403':
          description: Forbidden — requires Admin or SecurityAnalyst
