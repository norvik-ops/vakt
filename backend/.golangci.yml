version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - misspell
    - ineffassign
    - unused
  settings:
    errcheck:
      check-type-assertions: true
    staticcheck:
      checks: ["all"]
  exclusions:
    rules:
      - linters:
          - errcheck
        path: "_test\\.go"

formatters:
  enable:
    - gofmt
