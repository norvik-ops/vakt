---
# Vakt — Ansible Update Playbook
#
# Usage:
#   ansible-playbook scripts/update.yml -i inventory.yml
#   ansible-playbook scripts/update.yml -i inventory.yml --extra-vars "force_update=true"
#
# Inventory example (inventory.yml):
#   all:
#     hosts:
#       customer-a:
#         ansible_host: 10.0.1.10
#         ansible_user: deploy
#         vakt_dir: /opt/vakt
#       customer-b:
#         ansible_host: 10.0.1.11
#         ansible_user: deploy
#         vakt_dir: /opt/vakt
#
# Requirements on target hosts:
#   - docker, docker compose plugin
#   - deploy user in the `docker` group
#   - vakt_dir contains docker-compose.yml and .env

- name: Update Vakt instances
  hosts: all
  become: false
  gather_facts: true

  vars:
    vakt_dir: /opt/vakt
    compose_file: docker-compose.yml
    backup_dir: "{{ vakt_dir }}/backups"
    force_update: false
    github_repo: norvik-ops/vakt
    update_script: "{{ vakt_dir }}/scripts/update.sh"

  tasks:
    - name: Check that vakt_dir exists
      ansible.builtin.stat:
        path: "{{ vakt_dir }}/{{ compose_file }}"
      register: compose_stat
      failed_when: not compose_stat.stat.exists

    - name: Check latest release from GitHub
      ansible.builtin.uri:
        url: "https://api.github.com/repos/{{ github_repo }}/releases/latest"
        return_content: true
        status_code: [200, 403, 404]
      register: github_response
      failed_when: false

    - name: Parse latest version
      ansible.builtin.set_fact:
        latest_version: "{{ (github_response.json.tag_name | default('unknown')) | regex_replace('^v', '') }}"
      when: github_response.status == 200

    - name: Set latest_version to unknown if GitHub unreachable
      ansible.builtin.set_fact:
        latest_version: "unknown"
      when: github_response.status != 200

    - name: Create backup directory
      ansible.builtin.file:
        path: "{{ backup_dir }}"
        state: directory
        mode: "0750"

    - name: Create pre-update database backup
      # pipefail: without it `pg_dump | gzip` reports gzip's exit status, so a failed
      # pg_dump writes a ~20-byte empty gzip and still succeeds — the exact class that
      # let the ISMS backup ship empty dumps for a week (R-M12/S131-E1). The size gate
      # rejects an empty stream, and this backup blocks the update if it fails.
      ansible.builtin.shell: |
        set -o pipefail
        out="{{ backup_dir }}/pre-update-$(date +%Y%m%d_%H%M%S).sql.gz"
        docker compose -f {{ vakt_dir }}/{{ compose_file }} exec -T postgres \
          pg_dump -U vakt vakt | gzip > "$out"
        size=$(stat -c%s "$out" 2>/dev/null || echo 0)
        if [ "$size" -lt 1000 ]; then
          echo "pre-update backup is only ${size}B (< 1KB) — pg_dump likely failed" >&2
          rm -f "$out"
          exit 1
        fi
      args:
        chdir: "{{ vakt_dir }}"
        executable: /bin/bash
      register: backup_result
      failed_when: false

    - name: Abort update if the pre-update backup failed
      # Proceeding with an update after a failed backup is exactly the "empty backup
      # is worse than a failed one" trap — an unrecoverable schema change with no way
      # back. Stop here instead of the previous "Proceeding anyway" (R-M12/S131-E1).
      ansible.builtin.fail:
        msg: "Pre-update database backup FAILED on {{ inventory_hostname }} — aborting the update. Fix the backup before retrying."
      when: backup_result.rc != 0

    - name: Pull latest container images
      ansible.builtin.shell: |
        docker compose -f {{ compose_file }} pull api worker
      args:
        chdir: "{{ vakt_dir }}"

    - name: Restart worker service
      ansible.builtin.shell: |
        docker compose -f {{ compose_file }} up -d --no-deps worker
      args:
        chdir: "{{ vakt_dir }}"

    - name: Restart API service (runs migrations automatically)
      ansible.builtin.shell: |
        docker compose -f {{ compose_file }} up -d --no-deps api
      args:
        chdir: "{{ vakt_dir }}"

    - name: Wait for API to become healthy
      ansible.builtin.shell: |
        docker compose -f {{ compose_file }} exec -T api \
          wget -qO- http://localhost:8080/health/ready 2>/dev/null | grep -q ready
      args:
        chdir: "{{ vakt_dir }}"
      retries: 15
      delay: 4
      register: health_check
      until: health_check.rc == 0

    - name: Rebuild and update frontend
      ansible.builtin.shell: |
        docker compose -f {{ compose_file }} up -d --no-deps --build frontend
      args:
        chdir: "{{ vakt_dir }}"

    - name: Reload nginx to pick up new frontend assets
      ansible.builtin.shell: |
        docker compose -f {{ compose_file }} exec -T nginx nginx -s reload
      args:
        chdir: "{{ vakt_dir }}"
      failed_when: false

    - name: Verify deployment health
      ansible.builtin.shell: |
        docker compose -f {{ compose_file }} exec -T api \
          wget -qO- http://localhost:8080/health/ready 2>/dev/null
      args:
        chdir: "{{ vakt_dir }}"
      register: final_health
      failed_when: "'ready' not in final_health.stdout"

    - name: Update complete
      ansible.builtin.debug:
        msg: >
          Vakt updated successfully on {{ inventory_hostname }}.
          Latest available: {{ latest_version }}.
          Backups in {{ backup_dir }}.
