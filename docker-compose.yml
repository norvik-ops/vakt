# Default log rotation for all long-running services. Docker's json-file driver
# has NO rotation by default — logs would grow until the disk fills, and a
# container recreate wipes them. 10m × 5 files = max 50 MB/service kept on disk,
# which is plenty for a support bundle (see docs/wiki/support.md "Logs einsammeln").
# Forward to a central aggregator instead if you need long-term retention
# (docs/operations.md "Log-Forwarding").
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

# Network segmentation per ISO 27001:2022 A.8.22 (S100-4 / COMP-M03).
# db-net: database layer only (postgres, pgbouncer) — redis/frontend cannot reach postgres directly.
# app-net: application layer (api, worker, redis, frontend, caddy, ollama).
# api and worker join both networks to reach pgbouncer.
# edge:   non-internal, Caddy-only — the frontdoor needs egress for ACME/
#         Let's-Encrypt and publishes 80/443.
# egress: non-internal, OUTBOUND only for api/worker/ollama (S131-A4/ADR-0076) —
#         model pull, EPSS/CERT-Bund, campaign SMTP, opt-in licence renewal. The data
#         stores (postgres, pgbouncer, redis) stay internal:true with no path out.
networks:
  db-net:
    internal: true
  app-net:
    internal: true
  edge: {}
  # egress: controlled OUTBOUND internet for the services that legitimately need it
  # (S131-A4/R-C01, ADR-0076). The former "everything internal:true" broke the model
  # pull, EPSS/CERT-Bund enrichment, campaign SMTP and opt-in licence renewal — and
  # ollama-init reported success on an impossible pull, /health lied "ai:ok". None of
  # these send CUSTOMER DATA out (model pull + CERT-Bund/EPSS are read-only fetches;
  # SMTP is the customer's own server; licence renewal is opt-in, token only), so they
  # do not breach the self-hosted invariant. Attached ONLY to api/worker/ollama; the
  # data stores (postgres, pgbouncer, redis) stay internal:true — no path out.
  egress: {}

services:
  frontend:
    image: ghcr.io/norvik-ops/vakt-frontend:${VAKT_TAG:-latest}
    build:
      context: ./frontend
      dockerfile: Dockerfile
    # Self-serving SPA image (own nginx on :80). Caddy proxies to it —
    # no host port, no shared volume. Image ships its own HEALTHCHECK.
    networks:
      - app-net
    logging: *default-logging
    mem_limit: 64m   # S124-6 (OPS-03): plain compose ignores deploy.resources.limits (HostConfig.Memory=0); mem_limit is honored
    deploy:
      resources:
        limits:
          memory: 64m
          cpus: '0.25'

  # Frontdoor / reverse proxy with automatic HTTPS (Let's Encrypt). Routes
  # /api/* + /health → api, everything else → the frontend SPA. Set VAKT_DOMAIN
  # in .env; see Caddyfile. Replaces the former static-nginx setup.
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    networks:
      - edge      # host ingress + egress for ACME
      - app-net   # reach frontend + api
    environment:
      VAKT_DOMAIN: ${VAKT_DOMAIN:-localhost}
    logging: *default-logging
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data       # Let's-Encrypt certs live here — never delete
      - caddy_config:/config
    depends_on:
      frontend:
        condition: service_healthy
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:2019/config/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    mem_limit: 64m   # S124-6 (OPS-03): plain compose ignores deploy.resources.limits (HostConfig.Memory=0); mem_limit is honored
    deploy:
      resources:
        limits:
          memory: 64m
          cpus: '0.25'

  # Copies scanner binaries (Trivy, Nuclei) into the shared scanner_bins volume
  # before the API/worker start. Runs on every compose-up so updates are picked up.
  vakt-scanners:
    image: ghcr.io/norvik-ops/vakt-scanners:${VAKT_TAG:-latest}
    build:
      context: ./backend
      dockerfile: Dockerfile.scanners
    network_mode: "none"
    volumes:
      - scanner_bins:/target
    restart: "no"

  migrate:
    image: ghcr.io/norvik-ops/vakt-api:${VAKT_TAG:-latest}
    build:
      context: ./backend
      dockerfile: Dockerfile
    entrypoint: ["/migrate"]
    user: "65532:65532"
    networks:
      - db-net
    env_file: .env
    environment:
      # Override the localhost URL from .env — containers reach postgres by service name, not localhost.
      VAKT_DB_URL: "postgres://vakt:${POSTGRES_PASSWORD:?}@postgres:5432/vakt?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    image: ghcr.io/norvik-ops/vakt-api:${VAKT_TAG:-latest}
    build:
      context: ./backend
      dockerfile: Dockerfile
    user: "65532:65532"
    # Distroless static binary needs no capabilities and never escalates.
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    networks:
      - app-net
      - db-net
      - egress   # opt-in licence renewal (token only) + guarded outbound (S131-A4)
    env_file: .env
    environment:
      VAKT_DB_URL: "postgres://vakt:${POSTGRES_PASSWORD:?}@pgbouncer:5432/vakt?sslmode=disable"
      # Derive the Redis URL from REDIS_PASSWORD so both stay in sync — a
      # stale VAKT_REDIS_URL in .env would otherwise fail Redis auth (S120-7).
      VAKT_REDIS_URL: "redis://:${REDIS_PASSWORD:?}@redis:6379"
      # Caddy sits in front of the API — without this, all IP rate limits and
      # the secondary login lockout collapse onto the Caddy container IP.
      VAKT_TRUSTED_PROXIES: "${VAKT_TRUSTED_PROXIES:-172.16.0.0/12}"
    restart: unless-stopped
    stop_grace_period: 15s
    logging: *default-logging
    volumes:
      - scanner_bins:/usr/local/bin:ro
      - uploads_data:/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      vakt-scanners:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "/healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    mem_limit: 512m   # S124-6 (OPS-03): plain compose ignores deploy.resources.limits (HostConfig.Memory=0); mem_limit is honored
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '1.0'

  worker:
    image: ghcr.io/norvik-ops/vakt-api:${VAKT_TAG:-latest}
    build:
      context: ./backend
      dockerfile: Dockerfile
    entrypoint: ["/worker"]
    user: "65532:65532"
    # ponytail: no read_only rootfs — trivy/nuclei write caches under $HOME.
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    networks:
      - app-net
      - db-net
      - egress   # EPSS/CERT-Bund enrichment, scanner DB updates, campaign SMTP (S131-A4)
    env_file: .env
    environment:
      VAKT_DB_URL: "postgres://vakt:${POSTGRES_PASSWORD:?}@pgbouncer:5432/vakt?sslmode=disable"
      VAKT_REDIS_URL: "redis://:${REDIS_PASSWORD:?}@redis:6379"
    restart: unless-stopped
    stop_grace_period: 30s
    logging: *default-logging
    volumes:
      - scanner_bins:/usr/local/bin:ro
    depends_on:
      redis:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      vakt-scanners:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "/healthcheck", "http://localhost:9090/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    mem_limit: 768m   # S124-6 (OPS-03): plain compose ignores deploy.resources.limits
    deploy:
      replicas: ${WORKER_REPLICAS:-1}
      resources:
        limits:
          # 768m: scanner subprocesses (trivy/nuclei/syft) buffer full output
          # in memory; concurrency is capped by VAKT_SCAN_CONCURRENCY (default 2).
          memory: 768m
          cpus: '0.5'

  postgres:
    image: postgres:16-alpine
    networks:
      - db-net
    environment:
      POSTGRES_DB: vakt
      POSTGRES_USER: vakt
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?err: POSTGRES_PASSWORD not set — run install.sh}"
    command: >
      postgres
      -c shared_buffers=128MB
      -c effective_cache_size=384MB
      -c work_mem=8MB
      -c checkpoint_completion_target=0.9
      -c max_connections=50
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    stop_grace_period: 60s
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vakt"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    mem_limit: 512m   # S124-6 (OPS-03): plain compose ignores deploy.resources.limits (HostConfig.Memory=0); mem_limit is honored
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '1.0'

  pgbouncer:
    # 1.22.1-p0: the bare "1.22.1" tag was removed from Docker Hub (2026-07)
    # — fresh installs failed to pull. Same pgbouncer version, rebuilt image.
    image: edoburu/pgbouncer:1.22.1-p0
    networks:
      - db-net
    environment:
      DB_USER: vakt
      DB_PASSWORD: "${POSTGRES_PASSWORD:?err: POSTGRES_PASSWORD not set}"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: vakt
      POOL_MODE: transaction
      # Postgres 16 authenticates with scram-sha-256; the 1.22.1-p0 image
      # defaults to md5 and fails with "wrong password type" (S120 smoke test).
      AUTH_TYPE: scram-sha-256
      MAX_CLIENT_CONN: "100"
      DEFAULT_POOL_SIZE: "20"
      # pgx sends extra_float_digits on connect — pgBouncer must ignore it
      IGNORE_STARTUP_PARAMETERS: "extra_float_digits"
      SERVER_RESET_QUERY: "DISCARD ALL"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 5432"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    mem_limit: 32m   # S124-6 (OPS-03): plain compose ignores deploy.resources.limits (HostConfig.Memory=0); mem_limit is honored
    deploy:
      resources:
        limits:
          memory: 32m
          cpus: '0.1'

  redis:
    image: redis:7-alpine
    networks:
      - app-net
    volumes:
      - redis_data:/data
    restart: unless-stopped
    logging: *default-logging
    # Redis-Auth: requirepass schützt vor unauthentifiziertem Zugriff aus dem Docker-Netzwerk.
    # maxmemory + allkeys-lru: verhindert OOM-Kills bei Cache-Overflow; älteste Keys werden verdrängt.
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?err: REDIS_PASSWORD not set}
      --maxmemory 400mb
      --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    mem_limit: 512m   # S124-6 (OPS-03): plain compose ignores deploy.resources.limits
    deploy:
      resources:
        limits:
          # Cgroup limit must exceed --maxmemory (400mb): Redis needs headroom
          # for allocator fragmentation + fork/COW, or the kernel OOM-kills it
          # before its own allkeys-lru eviction can run (S120-6).
          memory: 512m
          cpus: '0.25'

  # AI Copilot via lokales LLM — standardmäßig aktiv (Community-Feature).
  # ollama-init zieht qwen2.5:7b beim ersten Start einmalig (~4.5 GB Disk).
  # Mindestanforderung mit KI: 8 GB RAM. Auf VMs mit < 8 GB RAM auf
  # qwen2.5:3b wechseln (VAKT_AI_MODEL=qwen2.5:3b, ~1.9 GB RAM).
  # Deaktivieren: VAKT_AI_PROVIDER=disabled in .env setzen.
  ollama:
    image: ollama/ollama:${OLLAMA_TAG:-0.31.2}
    networks:
      - app-net
      - egress   # pulls the model from registry.ollama.ai (no customer data) (S131-A4)
    volumes:
      - ollama_models:/root/.ollama
    restart: unless-stopped
    environment:
      OLLAMA_KEEP_ALIVE: "-1"
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    mem_limit: 8g   # S124-6 (OPS-03): plain compose ignores deploy.resources.limits (HostConfig.Memory=0); mem_limit is honored
    deploy:
      resources:
        limits:
          memory: 8g
          cpus: '2.0'

  # Pre-pull des Default-Modells beim ersten Start. Läuft genau einmal pro
  # Volume — wenn das Modell schon da ist, ist `ollama pull` ein No-Op.
  # Restart=no damit der Container nach erfolgreichem Pull beendet bleibt.
  ollama-init:
    image: ollama/ollama:${OLLAMA_TAG:-0.31.2}
    networks:
      - app-net
    entrypoint: ["/bin/sh", "-c"]
    # Literal block (|), NOT folded (>): a folded scalar keeps a more-indented
    # continuation line as a real newline, which fed sh a line starting with `||`
    # (syntax error on the happy path). Literal preserves newlines as statement
    # separators, so this is a normal multi-line script.
    command:
      - |
        set -e
        echo "Pre-pulling default model ${VAKT_AI_MODEL:-qwen2.5:7b} (one-time)..."
        if ! OLLAMA_HOST=http://ollama:11434 ollama pull ${VAKT_AI_MODEL:-qwen2.5:7b}; then
          echo "ERROR: model pull failed — the ollama service needs outbound access to registry.ollama.ai (egress network). Not exiting 0 on an impossible pull (S131-A4/R-C01)." >&2
          exit 1
        fi
        echo "Warming up model (loads into RAM)..."
        OLLAMA_HOST=http://ollama:11434 ollama run ${VAKT_AI_MODEL:-qwen2.5:7b} "" 2>/dev/null || true
        echo "Model ready and loaded."
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"

  # Watchtower — automatic container updates (opt-in).
  # Uncomment to enable automatic nightly pulls of new Vakt images.
  # WARNING: Only enable on non-critical instances or if you've tested the update path.
  # See docs/configuration.md for update strategy guidance.
  #
  # watchtower:
  #   image: containrrr/watchtower:latest
  #   volumes:
  #     - /var/run/docker.sock:/var/run/docker.sock
  #   command: --schedule "0 0 3 * * *" --cleanup api worker
  #   restart: unless-stopped
  #   environment:
  #     WATCHTOWER_NOTIFICATIONS: shoutrrr
  #     # WATCHTOWER_NOTIFICATION_URL: slack://token@channel  # optional Slack alerts

volumes:
  postgres_data:
  redis_data:
  ollama_models:
  scanner_bins:
  uploads_data:
  caddy_data:
  caddy_config:
