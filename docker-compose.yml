# Default log rotation for all long-running services. Docker's json-file driver
# has NO rotation by default — logs would grow until the disk fills, and a
# container recreate wipes them. 10m × 5 files = max 50 MB/service kept on disk,
# which is plenty for a support bundle (see docs/wiki/support.md "Logs einsammeln").
# Forward to a central aggregator instead if you need long-term retention
# (docs/operations.md "Log-Forwarding").
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

# Network segmentation per ISO 27001:2022 A.8.22 (S100-4 / COMP-M03).
# db-net: database layer only (postgres, pgbouncer) — redis and nginx cannot reach postgres directly.
# app-net: application layer (api, worker, redis, nginx, ollama).
# api and worker join both networks to reach pgbouncer.
networks:
  db-net:
    internal: true
  app-net:
    internal: true

services:
  frontend:
    image: ghcr.io/matharnica/vakt-frontend:${VAKT_TAG:-latest}
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - frontend_dist:/app/dist
    # This service exits after building static assets into the shared volume.

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      # 443 wird durch einen vorgelagerten Reverse-Proxy (z.B. Caddy) terminiert.
      # Für HTTPS: siehe docs/setup.md Abschnitt "TLS mit Caddy".
    networks:
      - app-net
    logging: *default-logging
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend_dist:/usr/share/nginx/html:ro
    depends_on:
      frontend:
        condition: service_completed_successfully
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health 2>/dev/null | grep -q ok || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 64m
          cpus: '0.25'

  # Copies scanner binaries (Trivy, Nuclei) into the shared scanner_bins volume
  # before the API/worker start. Runs on every compose-up so updates are picked up.
  vakt-scanners:
    image: ghcr.io/matharnica/vakt-scanners:${VAKT_TAG:-latest}
    build:
      context: ./backend
      dockerfile: Dockerfile.scanners
    network_mode: "none"
    volumes:
      - scanner_bins:/target
    restart: "no"

  migrate:
    image: ghcr.io/matharnica/vakt-api:${VAKT_TAG:-latest}
    build:
      context: ./backend
      dockerfile: Dockerfile
    entrypoint: ["/migrate"]
    user: "65532:65532"
    networks:
      - db-net
    env_file: .env
    environment:
      # Override the localhost URL from .env — containers reach postgres by service name, not localhost.
      VAKT_DB_URL: "postgres://vakt:${POSTGRES_PASSWORD:?}@postgres:5432/vakt?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    image: ghcr.io/matharnica/vakt-api:${VAKT_TAG:-latest}
    build:
      context: ./backend
      dockerfile: Dockerfile
    user: "65532:65532"
    networks:
      - app-net
      - db-net
    env_file: .env
    environment:
      VAKT_DB_URL: "postgres://vakt:${POSTGRES_PASSWORD:?}@pgbouncer:5432/vakt?sslmode=disable"
    restart: unless-stopped
    logging: *default-logging
    volumes:
      - scanner_bins:/usr/local/bin:ro
      - uploads_data:/app/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      vakt-scanners:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "/healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '1.0'

  worker:
    image: ghcr.io/matharnica/vakt-api:${VAKT_TAG:-latest}
    build:
      context: ./backend
      dockerfile: Dockerfile
    entrypoint: ["/worker"]
    user: "65532:65532"
    networks:
      - app-net
      - db-net
    env_file: .env
    environment:
      VAKT_DB_URL: "postgres://vakt:${POSTGRES_PASSWORD:?}@pgbouncer:5432/vakt?sslmode=disable"
    restart: unless-stopped
    logging: *default-logging
    volumes:
      - scanner_bins:/usr/local/bin:ro
    depends_on:
      redis:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      vakt-scanners:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "/healthcheck", "http://localhost:9090/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      replicas: ${WORKER_REPLICAS:-1}
      resources:
        limits:
          memory: 256m
          cpus: '0.5'

  postgres:
    image: postgres:16-alpine
    networks:
      - db-net
    environment:
      POSTGRES_DB: vakt
      POSTGRES_USER: vakt
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?err: POSTGRES_PASSWORD not set — run install.sh}"
    command: >
      postgres
      -c shared_buffers=128MB
      -c effective_cache_size=384MB
      -c work_mem=8MB
      -c checkpoint_completion_target=0.9
      -c max_connections=50
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vakt"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '1.0'

  pgbouncer:
    image: edoburu/pgbouncer:1.22.1
    networks:
      - db-net
    environment:
      DB_USER: vakt
      DB_PASSWORD: "${POSTGRES_PASSWORD:?err: POSTGRES_PASSWORD not set}"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: vakt
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "100"
      DEFAULT_POOL_SIZE: "20"
      # pgx sends extra_float_digits on connect — pgBouncer must ignore it
      IGNORE_STARTUP_PARAMETERS: "extra_float_digits"
      SERVER_RESET_QUERY: "DISCARD ALL"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 5432"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 32m
          cpus: '0.1'

  redis:
    image: redis:7-alpine
    networks:
      - app-net
    volumes:
      - redis_data:/data
    restart: unless-stopped
    logging: *default-logging
    # Redis-Auth: requirepass schützt vor unauthentifiziertem Zugriff aus dem Docker-Netzwerk.
    # REDIS_PASSWORD muss in .env gesetzt sein (siehe .env.example).
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?err: REDIS_PASSWORD not set}"]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: '0.25'

  # AI Copilot via lokales LLM — seit v0.6.x default-on (Community-Feature).
  # Default-Modell qwen2.5:7b wird beim ersten Start automatisch von ollama-init
  # gezogen (~4.5 GB Disk; läuft nur einmal, danach idle).
  # Mindestanforderung: 8 GB RAM (Minimum), 16 GB RAM (Empfohlen).
  # Zum Deaktivieren: VAKT_AI_PROVIDER=disabled in .env setzen.
  # Auf VMs mit < 8 GB RAM auf qwen2.5:3b wechseln (VAKT_AI_MODEL=qwen2.5:3b)
  # oder ganz deaktivieren — ollama + ollama-init dann ebenfalls entfernen
  # oder stoppen, damit der RAM-Footprint entfällt.
  ollama:
    image: ollama/ollama:${OLLAMA_TAG:-0.6}
    networks:
      - app-net
    volumes:
      - ollama_models:/root/.ollama
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 8g
          cpus: '2.0'

  # Pre-pull des Default-Modells beim ersten Start. Läuft genau einmal pro
  # Volume — wenn das Modell schon da ist, ist `ollama pull` ein No-Op.
  # Restart=no damit der Container nach erfolgreichem Pull beendet bleibt.
  ollama-init:
    image: ollama/ollama:${OLLAMA_TAG:-0.6}
    networks:
      - app-net
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >
        echo 'Pre-pulling default model ${VAKT_AI_MODEL:-qwen2.5:7b} (one-time)...';
        OLLAMA_HOST=http://ollama:11434 ollama pull ${VAKT_AI_MODEL:-qwen2.5:7b};
        echo 'Model ready.'
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"

  # Watchtower — automatic container updates (opt-in).
  # Uncomment to enable automatic nightly pulls of new Vakt images.
  # WARNING: Only enable on non-critical instances or if you've tested the update path.
  # See docs/configuration.md for update strategy guidance.
  #
  # watchtower:
  #   image: containrrr/watchtower:latest
  #   volumes:
  #     - /var/run/docker.sock:/var/run/docker.sock
  #   command: --schedule "0 0 3 * * *" --cleanup api worker
  #   restart: unless-stopped
  #   environment:
  #     WATCHTOWER_NOTIFICATIONS: shoutrrr
  #     # WATCHTOWER_NOTIFICATION_URL: slack://token@channel  # optional Slack alerts

volumes:
  postgres_data:
  redis_data:
  frontend_dist:
  ollama_models:
  scanner_bins:
  uploads_data:
