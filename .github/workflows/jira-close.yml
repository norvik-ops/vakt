name: Jira Issue Closed

on:
  repository_dispatch:
    types: [jira-closed]

jobs:
  close-github-issue:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Close GitHub Issue
        uses: actions/github-script@v7
        env:
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
        with:
          script: |
            const script = require(require("path").join(process.env.GITHUB_WORKSPACE, ".github/scripts/jira-close.js"));
            await script({github, context, core});
