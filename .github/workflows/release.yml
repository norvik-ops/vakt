name: Release

# Triggered when a tag in the form vX.Y.Z is pushed (synced from upstream).
# Generates a GitHub Release with auto-generated changelog notes plus the
# CHANGELOG.md entry for this version.

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract changelog entry
        id: changelog
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          # Extract the section for this version from CHANGELOG.md
          # (between "## [vX.Y.Z]" and the next "## [")
          if [ -f CHANGELOG.md ]; then
            awk -v ver="$VERSION" '
              $0 ~ "^## \\[" ver "\\]" {found=1; print; next}
              found && /^## \[/ {exit}
              found {print}
            ' CHANGELOG.md > /tmp/release-notes.md
            if [ ! -s /tmp/release-notes.md ]; then
              echo "Release $VERSION" > /tmp/release-notes.md
            fi
          else
            echo "Release $VERSION" > /tmp/release-notes.md
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.changelog.outputs.version }}
          body_path: /tmp/release-notes.md
          generate_release_notes: true
          draft: false
          prerelease: false
