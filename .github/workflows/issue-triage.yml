name: Issue Triage Agent

on:
  issues:
    types: [opened]

jobs:
  triage:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - name: Claude Triage Agent
        uses: actions/github-script@v7
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
        with:
          script: |
            const issue = context.payload.issue;
            const labels = issue.labels.map(l => l.name);
            const systemPrompt = [
              "Du bist der Triage-Agent fuer Vakt, eine selbst gehostete ISMS-Plattform fuer den DACH-Mittelstand.",
              "Antworte AUSSCHLIESSLICH mit einem JSON-Objekt ohne Markdown:",
              '{"type":"bug|feature|question|spam","labels_add":[],"labels_remove":[],"severity":"critical|high|medium|low|none","comment":"Kommentar auf Deutsch","jira_create":true,"jira_summary":"Zusammenfassung max 80 Zeichen"}',
              "Regeln:",
              "- type: bug/feature/question/spam erkennen",
              "- labels_add: bug, feature, question, severity: critical, severity: high, severity: medium, severity: low, status: needs-info, status: confirmed",
              "- labels_remove: 'status: needs-triage' entfernen wenn Typ klar ist",
              "- severity: critical NUR bei Datenverlust oder Auth-Bypass",
              "- comment: Spezifisch auf Deutsch, 3-5 Saetze. Kein generisches Danke. Bei Bugs: bestaetigen was du verstanden hast, was als naechstes passiert, Einschaetzung zur Prioritaet. Bei lueckenhaften Reports: gezielt nachfragen. Bei Features: ehrliche Einschaetzung ob/wann realistisch.",
              "- jira_create: true bei reproduzierbaren Bugs und sinnvollen Features",
              "- jira_summary: max 80 Zeichen Deutsch"
            ].join("\n");
            const userMessage = "Issue #" + issue.number + ": " + issue.title + "\nLabels: " + (labels.join(", ") || "keine") + "\n\n" + (issue.body || "(leer)");
            const res = await fetch("https://api.anthropic.com/v1/messages", {
              method: "POST",
              headers: {"Content-Type": "application/json", "x-api-key": process.env.ANTHROPIC_API_KEY, "anthropic-version": "2023-06-01"},
              body: JSON.stringify({model: "claude-haiku-4-5-20251001", max_tokens: 1024, system: systemPrompt, messages: [{role: "user", content: userMessage}]})
            });
            const data = await res.json();
            core.info("Claude: " + JSON.stringify(data));
            let result;
            try {
              const m = data.content[0].text.trim().match(/\{[\s\S]*\}/);
              result = JSON.parse(m ? m[0] : data.content[0].text.trim());
            } catch(e) { core.error("Parse Error: " + data.content[0].text); return; }
            core.info("Result: " + JSON.stringify(result));
            if (result.labels_add && result.labels_add.length) {
              await github.rest.issues.addLabels({owner: context.repo.owner, repo: context.repo.repo, issue_number: issue.number, labels: result.labels_add});
            }
            for (const label of (result.labels_remove || [])) {
              try { await github.rest.issues.removeLabel({owner: context.repo.owner, repo: context.repo.repo, issue_number: issue.number, name: label}); } catch(e) {}
            }
            if (result.comment) {
              await github.rest.issues.createComment({owner: context.repo.owner, repo: context.repo.repo, issue_number: issue.number, body: result.comment + "\n\n_\u2014 Vakt Team_"});
            }
            let jiraKey = null;
            if (result.jira_create && process.env.JIRA_API_TOKEN && process.env.JIRA_EMAIL) {
              const jr = await fetch("https://norvikops.atlassian.net/rest/api/3/issue", {
                method: "POST",
                headers: {"Content-Type": "application/json", "Authorization": "Basic " + Buffer.from(process.env.JIRA_EMAIL + ":" + process.env.JIRA_API_TOKEN).toString("base64")},
                body: JSON.stringify({fields: {project: {key: "VAKT"}, summary: (result.jira_summary || issue.title).substring(0, 80), description: {type: "doc", version: 1, content: [{type: "paragraph", content: [{type: "text", text: "GitHub #" + issue.number + ": " + issue.html_url + "\n\n" + (issue.body || "")}]}]}, issuetype: {name: result.type === "bug" ? "Bug" : "Story"}, parent: {key: "VAKT-866"}}})
              });
              const jd = await jr.json();
              if (jd.key) {
                jiraKey = jd.key;
                await github.rest.issues.createComment({owner: context.repo.owner, repo: context.repo.repo, issue_number: issue.number, body: "\uD83D\uDCCB Jira: [" + jiraKey + "](https://norvikops.atlassian.net/browse/" + jiraKey + ")"});
              }
            }
            if (result.type === "bug" && jiraKey && result.severity !== "none") {
              try {
                const treeRes = await github.rest.git.getTree({owner: context.repo.owner, repo: context.repo.repo, tree_sha: "main", recursive: "true"});
                const relevantFiles = treeRes.data.tree.filter(f => f.type === "blob" && (f.path.endsWith(".go") || f.path.endsWith(".ts") || f.path.endsWith(".tsx"))).map(f => f.path).slice(0, 80);
                const diagRes = await fetch("https://api.anthropic.com/v1/messages", {
                  method: "POST",
                  headers: {"Content-Type": "application/json", "x-api-key": process.env.ANTHROPIC_API_KEY, "anthropic-version": "2023-06-01"},
                  body: JSON.stringify({model: "claude-haiku-4-5-20251001", max_tokens: 1024, system: "Du bist ein erfahrener Go/TypeScript Entwickler und analysierst Bugs in Vakt. Identifiziere welche Dateien wahrscheinlich betroffen sind. Antworte auf Deutsch, technisch praezise, fuer interne Nutzung. Format: Diagnose + verdaechtige Dateien + moegliche Ursache.", messages: [{role: "user", content: "Bug: " + issue.title + "\n\n" + (issue.body || "") + "\n\nDateistruktur:\n" + relevantFiles.join("\n")}]})
                });
                const diagData = await diagRes.json();
                await fetch("https://norvikops.atlassian.net/rest/api/3/issue/" + jiraKey + "/comment", {
                  method: "POST",
                  headers: {"Content-Type": "application/json", "Authorization": "Basic " + Buffer.from(process.env.JIRA_EMAIL + ":" + process.env.JIRA_API_TOKEN).toString("base64")},
                  body: JSON.stringify({body: {type: "doc", version: 1, content: [{type: "heading", attrs: {level: 3}, content: [{type: "text", text: "Automatische Bug-Diagnose"}]}, {type: "paragraph", content: [{type: "text", text: diagData.content[0].text}]}, {type: "paragraph", content: [{type: "text", text: "GitHub: " + issue.html_url, marks: [{type: "em"}]}]}]}})
                });
              } catch(e) { core.warning("Diagnose fehlgeschlagen: " + e.message); }
            }

