name: Issue Comment Agent

on:
  issue_comment:
    types: [created]

jobs:
  triage-comment:
    runs-on: ubuntu-latest
    if: github.event.issue.pull_request == null
    permissions:
      issues: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Claude Comment Agent
        uses: actions/github-script@v7
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          script: |
            const script = require(require("path").join(process.env.GITHUB_WORKSPACE, ".github/scripts/triage-comment.js"));
            await script({github, context, core});
