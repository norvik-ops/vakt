openapi: 3.0.3
info:
  title: Vakt API
  version: "0.23.0"
  description: |
    Self-hosted Security & Compliance Platform API.
    All data stays within your infrastructure — no phone-home, no cloud dependency.

    **Authentication:** Paseto v2 bearer tokens. Obtain a token via `POST /auth/login`.
    Include it as `Authorization: Bearer <token>` on all protected endpoints.

    **Base URL:** `/api/v1`

    **Pagination:** `?page=1&limit=25` on list endpoints.

    **Error format:**
    ```json
    { "error": "message", "code": "ERROR_CODE", "details": {} }
    ```

servers:
  - url: /api/v1
    description: Vakt API v1

security:
  - BearerAuth: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Paseto

  parameters:
    PageParam:
      name: page
      in: query
      schema:
        type: integer
        default: 1
    LimitParam:
      name: limit
      in: query
      schema:
        type: integer
        default: 25
        maximum: 100

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
        code:
          type: string

    Pagination:
      type: object
      properties:
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer

    # ── Auth ──────────────────────────────────────────────────────────────────

    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string

    RefreshResponse:
      type: object
      properties:
        token:
          type: string
          description: New Paseto v2 access token
        refresh_token:
          type: string
          description: New refresh token

    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: ok
        version:
          type: string
          description: Version-Tag der laufenden Instanz (z.B. "v0.14.1")
        demo:
          type: boolean
          description: True wenn die Instanz im Demo-Modus läuft (VAKT_DEMO=true).
        sso_enabled:
          type: boolean
          description: True wenn Casdoor-OIDC konfiguriert ist (Login-Page blendet SSO-Button ein).

    DemoStartResponse:
      type: object
      required: [admin_email, admin_password, analyst_email, analyst_password, expires_in]
      properties:
        admin_email:
          type: string
          format: email
        admin_password:
          type: string
          description: Klartext-Passwort (einmaliger Disclosure — danach nur Bcrypt-Hash in DB).
        analyst_email:
          type: string
          format: email
        analyst_password:
          type: string
        expires_in:
          type: integer
          description: Sekunden bis die ephemere Demo-Org von Asynq-Cleanup gelöscht wird (default 14400 = 4h).

    SessionInfo:
      type: object
      required: [id, last_used, created_at, expires_at]
      properties:
        id:
          type: string
          format: uuid
        device_hint:
          type: string
          description: User-Agent-Auszug (max. 120 Zeichen)
        last_used:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        is_current:
          type: boolean
          description: True, wenn diese Session zur aktuellen X-Vakt-Session-Id passt.

    TOTPStatusResponse:
      type: object
      properties:
        enabled:
          type: boolean

    TOTPSetupResponse:
      type: object
      properties:
        secret:
          type: string
          description: Base32-encoded TOTP secret (display to user for manual entry)
        uri:
          type: string
          description: otpauth:// URI for QR code generation

    TOTPConfirmRequest:
      type: object
      required: [code]
      properties:
        code:
          type: string
          description: 6-digit TOTP code from authenticator app

    TOTPConfirmResponse:
      type: object
      properties:
        backup_codes:
          type: array
          items:
            type: string
          description: Single-use backup codes (store securely)
        recovery_codes:
          type: array
          items:
            type: string
          description: Recovery codes for account recovery

    TOTPCodeRequest:
      type: object
      required: [code]
      properties:
        code:
          type: string
          description: 6-digit TOTP code

    TOTPVerifyRequest:
      type: object
      properties:
        code:
          type: string
          description: 6-digit TOTP code
        backup_code:
          type: string
          description: Single-use backup code (alternative to code)

    TOTPRecoveryRequest:
      type: object
      required: [code]
      properties:
        code:
          type: string
          description: Recovery code

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    LoginResponse:
      type: object
      required: [access_token, refresh_token, expires_in, user]
      properties:
        access_token:
          type: string
          description: Paseto v4 bearer token (lebt 1 Stunde)
        refresh_token:
          type: string
          description: Opaque refresh token (lebt 30 Tage, in Redis hinterlegt)
        expires_in:
          type: integer
          description: Access-Token-Lebenszeit in Sekunden
        user:
          $ref: '#/components/schemas/User'
        session_id:
          type: string
          format: uuid
          description: refresh_sessions.id der gerade ausgestellten Session — Frontend
            speichert sie und sendet sie als X-Vakt-Session-Id Header beim Sessions-Endpoint,
            damit "diese Session" in der UI markiert + Revoke-All-Others sich selbst
            ausnehmen kann.

    User:
      type: object
      required: [id, email, display_name, roles]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        display_name:
          type: string
        roles:
          type: array
          items:
            type: string
            enum: [Admin, SecurityAnalyst, Auditor, Viewer]

    # ── SecPulse ──────────────────────────────────────────────────────────────

    Asset:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        type:
          type: string
          enum: [web_app, server, database, container, repo]
        target:
          type: string
        criticality:
          type: string
          enum: [low, medium, high, critical]
        tags:
          type: array
          items:
            type: string
        environment:
          type: string
          enum: [prod, staging, dev]
        created_at:
          type: string
          format: date-time

    CreateAssetRequest:
      type: object
      required: [name, type, target, criticality]
      properties:
        name:
          type: string
        type:
          type: string
          enum: [web_app, server, database, container, repo]
        target:
          type: string
        criticality:
          type: string
          enum: [low, medium, high, critical]
        tags:
          type: array
          items:
            type: string

    Finding:
      type: object
      properties:
        id:
          type: string
          format: uuid
        asset_id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        severity:
          type: string
          enum: [info, low, medium, high, critical]
        status:
          type: string
          enum: [open, in_progress, resolved, accepted]
        cve:
          type: string
        cvss_score:
          type: number
        created_at:
          type: string
          format: date-time

    # ── SecVitals ─────────────────────────────────────────────────────────────

    Framework:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        total_controls:
          type: integer
        implemented_controls:
          type: integer
        score:
          type: number

    Control:
      type: object
      properties:
        id:
          type: string
          format: uuid
        framework_id:
          type: string
          format: uuid
        code:
          type: string
        title:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [not_started, in_progress, implemented, not_applicable]
        responsible:
          type: string
        due_date:
          type: string
          format: date

    Risk:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        likelihood:
          type: integer
          minimum: 1
          maximum: 5
        impact:
          type: integer
          minimum: 1
          maximum: 5
        risk_score:
          type: integer
        status:
          type: string
          enum: [open, mitigated, accepted, closed]
        owner:
          type: string

    Incident:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        severity:
          type: string
          enum: [low, medium, high, critical]
        status:
          type: string
          enum: [open, investigating, contained, resolved]
        type:
          type: string
        created_at:
          type: string
          format: date-time

    # ── SecPrivacy ────────────────────────────────────────────────────────────

    VVTEntry:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        purpose:
          type: string
        legal_basis:
          type: string
        data_categories:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time

    Breach:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        severity:
          type: string
          enum: [low, medium, high, critical]
        status:
          type: string
        discovered_at:
          type: string
          format: date-time
        notified_authority_at:
          type: string
          format: date-time
          nullable: true

    # ── Webhooks ──────────────────────────────────────────────────────────────

    Webhook:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        url:
          type: string
          format: uri
        events:
          type: array
          items:
            type: string
        active:
          type: boolean
        last_triggered_at:
          type: string
          format: date-time
          nullable: true
        last_status_code:
          type: integer
          nullable: true

    # ── Notifications ─────────────────────────────────────────────────────────

    NotificationPreferences:
      type: object
      properties:
        email_findings:
          type: boolean
        email_incidents:
          type: boolean
        email_control_due:
          type: boolean
        email_weekly_digest:
          type: boolean
        inapp_findings:
          type: boolean
        inapp_incidents:
          type: boolean
        inapp_control_due:
          type: boolean

    # ── HR ────────────────────────────────────────────────────────────────────

    Employee:
      type: object
      properties:
        id:
          type: string
          format: uuid
        org_id:
          type: string
          format: uuid
        first_name:
          type: string
        last_name:
          type: string
        email:
          type: string
          format: email
        department:
          type: string
        role:
          type: string
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        status:
          type: string
          enum: [active, offboarding, terminated]
        notes:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateEmployeeInput:
      type: object
      required: [first_name, last_name, email]
      properties:
        first_name:
          type: string
        last_name:
          type: string
        email:
          type: string
          format: email
        department:
          type: string
        role:
          type: string
        start_date:
          type: string
          format: date
        notes:
          type: string

    UpdateEmployeeInput:
      type: object
      required: [first_name, last_name, status]
      properties:
        first_name:
          type: string
        last_name:
          type: string
        department:
          type: string
        role:
          type: string
        end_date:
          type: string
          format: date
        status:
          type: string
          enum: [active, offboarding, terminated]
        notes:
          type: string

    ChecklistItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        label:
          type: string
        required:
          type: boolean

    Checklist:
      type: object
      properties:
        id:
          type: string
          format: uuid
        org_id:
          type: string
          format: uuid
        type:
          type: string
          enum: [onboarding, offboarding]
        name:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/ChecklistItem'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateChecklistInput:
      type: object
      required: [type, name]
      properties:
        type:
          type: string
          enum: [onboarding, offboarding]
        name:
          type: string
          maxLength: 255
        items:
          type: array
          items:
            $ref: '#/components/schemas/ChecklistItem'

    ChecklistRun:
      type: object
      properties:
        id:
          type: string
          format: uuid
        org_id:
          type: string
          format: uuid
        employee_id:
          type: string
          format: uuid
        checklist_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [in_progress, completed]
        completed_items:
          type: array
          items:
            type: string
            format: uuid
        started_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    StartChecklistRunInput:
      type: object
      required: [employee_id, checklist_id]
      properties:
        employee_id:
          type: string
          format: uuid
        checklist_id:
          type: string
          format: uuid

    UpdateChecklistRunInput:
      type: object
      required: [status]
      properties:
        completed_items:
          type: array
          items:
            type: string
            format: uuid
        status:
          type: string
          enum: [in_progress, completed]

    # ── SecReflex ─────────────────────────────────────────────────────────────

    PhishingTemplate:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        subject:
          type: string
        body:
          type: string
          description: HTML body of the phishing email
        preset:
          type: boolean
        created_at:
          type: string
          format: date-time

    CreateTemplateInput:
      type: object
      required: [name, subject, body]
      properties:
        name:
          type: string
        subject:
          type: string
        body:
          type: string

    TargetGroup:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        source:
          type: string
        target_count:
          type: integer
        created_at:
          type: string
          format: date-time

    Target:
      type: object
      properties:
        id:
          type: string
          format: uuid
        group_id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        first_name:
          type: string
        last_name:
          type: string

    LandingPage:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        html:
          type: string
        created_at:
          type: string
          format: date-time

    Campaign:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        status:
          type: string
          enum: [draft, running, completed, aborted]
        template_id:
          type: string
          format: uuid
        group_id:
          type: string
          format: uuid
        landing_page_id:
          type: string
          format: uuid
        track_opens:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateCampaignInput:
      type: object
      required: [name, template_id, group_id]
      properties:
        name:
          type: string
        template_id:
          type: string
          format: uuid
        group_id:
          type: string
          format: uuid
        landing_page_id:
          type: string
          format: uuid
        track_opens:
          type: boolean
          default: true

    CampaignStats:
      type: object
      properties:
        campaign_id:
          type: string
          format: uuid
        sent:
          type: integer
        opened:
          type: integer
        clicked:
          type: integer
        submitted:
          type: integer
        reported:
          type: integer
        open_rate:
          type: number
          format: float
        click_rate:
          type: number
          format: float

    TrainingModule:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        duration_minutes:
          type: integer
        assigned_count:
          type: integer
        completed_count:
          type: integer
        created_at:
          type: string
          format: date-time

    TrainingAssignment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        module_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [assigned, completed]
        assigned_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time

    DORAThirdParty:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        service_type:
          type: string
        criticality:
          type: string
          enum: [low, medium, high, critical]
        country:
          type: string
        contact_email:
          type: string
          format: email
        notes:
          type: string
        linked_controls_count:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ResilienceTest:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        test_type:
          type: string
          enum: [vulnerability_assessment, penetration_test, tlpt, scenario_based]
        status:
          type: string
          enum: [planned, in_progress, completed, failed]
        scheduled_date:
          type: string
          format: date
        completed_date:
          type: string
          format: date
        scope:
          type: string
        outcome:
          type: string
        notes:
          type: string
        attachments:
          type: array
          items:
            type: object
            properties:
              id: { type: string, format: uuid }
              filename: { type: string }
              uploaded_at: { type: string, format: date-time }
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    AISystem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        vendor:
          type: string
        use_case:
          type: string
        deployment_context:
          type: string
        risk_category:
          type: string
          enum: [minimal, limited, high, unacceptable]
        classification_status:
          type: string
          enum: [not_classified, classified, review_needed]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    AIClassification:
      type: object
      properties:
        id:
          type: string
          format: uuid
        ai_system_id:
          type: string
          format: uuid
        risk_category:
          type: string
          enum: [minimal, limited, high, unacceptable]
        prohibited_use_case:
          type: boolean
        high_risk_annex3:
          type: boolean
        high_risk_annex2:
          type: boolean
        limited_transparency:
          type: boolean
        reasoning:
          type: string
        classified_by:
          type: string
          format: uuid
        classified_at:
          type: string
          format: date-time

    AIDocumentation:
      type: object
      properties:
        id:
          type: string
          format: uuid
        ai_system_id:
          type: string
          format: uuid
        version:
          type: integer
        intended_purpose:
          type: string
        training_data_description:
          type: string
        performance_metrics:
          type: string
        human_oversight_measures:
          type: string
        limitations:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Authority:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        country:
          type: string
        type:
          type: string
          enum: [data_protection, cybersecurity, sector_specific, financial]
        notification_email:
          type: string
          format: email
        notification_url:
          type: string
          format: uri
        deadline_hours:
          type: integer
          description: Reporting deadline in hours (e.g. 72 for GDPR Art. 33)
        applicable_frameworks:
          type: array
          items:
            type: string

    BCPPlan:
      type: object
      required: [id, org_id, title, scope, version, status, owner, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        org_id: { type: string, format: uuid }
        title: { type: string }
        scope: { type: string }
        version: { type: string }
        status: { type: string, enum: [draft, active, archived] }
        owner: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    BCPTest:
      type: object
      required: [id, org_id, plan_id, test_date, test_type, outcome, findings, created_at]
      properties:
        id: { type: string, format: uuid }
        org_id: { type: string, format: uuid }
        plan_id: { type: string, format: uuid }
        test_date: { type: string, format: date }
        test_type: { type: string, enum: [tabletop, walkthrough, fulltest] }
        outcome: { type: string, enum: [passed, failed, partial] }
        findings: { type: string }
        created_at: { type: string, format: date-time }

    ProtectionNeedAssessment:
      type: object
      required: [id, org_id, name, object_type, object_name, confidentiality, integrity, availability, overall, status, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        org_id: { type: string, format: uuid }
        name: { type: string }
        object_type: { type: string, enum: [process, system, information, location] }
        object_name: { type: string }
        confidentiality: { type: string, enum: [normal, hoch, sehr_hoch] }
        integrity: { type: string, enum: [normal, hoch, sehr_hoch] }
        availability: { type: string, enum: [normal, hoch, sehr_hoch] }
        overall: { type: string, enum: [normal, hoch, sehr_hoch] }
        status: { type: string, enum: [draft, finalized] }
        finalized_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    AccessConcept:
      type: object
      required: [id, org_id, title, scope, owner, current_version, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        org_id: { type: string, format: uuid }
        title: { type: string }
        scope: { type: string }
        owner: { type: string }
        current_version: { type: integer }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    AccessRole:
      type: object
      required: [id, concept_id, org_id, role_name, system_name, access_level, justification, review_interval_months, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        concept_id: { type: string, format: uuid }
        org_id: { type: string, format: uuid }
        role_name: { type: string }
        system_name: { type: string }
        access_level: { type: string, enum: [read, write, admin, no_access] }
        justification: { type: string }
        review_interval_months: { type: integer }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    AccessConceptVersionSummary:
      type: object
      required: [id, concept_id, version_number, created_at]
      properties:
        id: { type: string, format: uuid }
        concept_id: { type: string, format: uuid }
        version_number: { type: integer }
        created_at: { type: string, format: date-time }

tags:
  - name: auth
    description: Authentication
  - name: vaktscan
    description: Vakt Scan — asset and vulnerability management
  - name: vaktcomply
    description: Vakt Comply — compliance frameworks and controls
  - name: vaktprivacy
    description: Vakt Privacy — GDPR documentation
  - name: vaktaware
    description: Vakt Aware — phishing simulations
  - name: vaktvault
    description: Vakt Vault — secrets management
  - name: webhooks
    description: Outgoing webhook configuration
  - name: notifications
    description: Notification preferences
  - name: hr
    description: Vakt HR — employee lifecycle and onboarding/offboarding checklists
  - name: admin
    description: Administration endpoints

paths:
  # ── Health ────────────────────────────────────────────────────────────────
  /health:
    get:
      summary: Liveness check + Frontend-Feature-Flags
      description: |
        Antwortet, solange der Prozess läuft. Frontend nutzt diesen Endpoint
        (siehe useDemoMode, Login.tsx) zur Feature-Detection:
        - `demo` schaltet die Login-Page in den Ephemeral-Demo-Flow
        - `sso_enabled` blendet den SSO-Button ein
        - `version` wird im Footer angezeigt
      tags: [admin]
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [status, version, demo, sso_enabled]
                properties:
                  status:
                    type: string
                    enum: [ok]
                  version:
                    type: string
                    example: "0.6.2"
                  demo:
                    type: boolean
                    description: VAKT_DEMO=true → ephemerer Demo-Flow aktiv
                  sso_enabled:
                    type: boolean
                    description: OIDC/SAML konfiguriert

  /health/ready:
    get:
      summary: Readiness check (DB + Redis)
      tags: [admin]
      security: []
      responses:
        '200':
          description: Ready
        '503':
          description: Not ready

  # ── Demo ──────────────────────────────────────────────────────────────────
  /demo/start:
    post:
      summary: Start an ephemeral demo session (returns one-time credentials)
      description: |
        Only registered when `VAKT_DEMO=true`. Each call creates a fresh, isolated
        demo organisation with a random slug and two seed accounts (admin +
        analyst). The cleartext passwords are returned **once**; the database
        stores only bcrypt hashes. An Asynq cleanup job purges ephemeral orgs
        after 4 hours.

        Rate-limited to 10 req/min per IP (burst 10, 5-minute reset window) to
        prevent abuse of the public demo deployment. Repeated calls beyond the
        limit return `429 rate limit exceeded`.
      tags: [admin]
      security: []
      responses:
        '200':
          description: New ephemeral demo session
          content:
            application/json:
              schema:
                type: object
                required:
                  - admin_email
                  - admin_password
                  - analyst_email
                  - analyst_password
                  - expires_in
                properties:
                  admin_email:
                    type: string
                    format: email
                    example: "admin@demo-a3f2b1c9.demo"
                  admin_password:
                    type: string
                    description: Cleartext password, returned exactly once.
                    example: "f4a9b7e2c1d80356"
                  analyst_email:
                    type: string
                    format: email
                    example: "analyst@demo-a3f2b1c9.demo"
                  analyst_password:
                    type: string
                    description: Cleartext password, returned exactly once.
                    example: "1e7c2bd930f48a16"
                  expires_in:
                    type: integer
                    description: Lifetime of the demo org in seconds (currently 14400 = 4 h).
                    example: 14400
        '429':
          description: Rate limit exceeded (10 req/min per IP).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Demo seed failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /demo/login:
    post:
      summary: Start an ephemeral demo session and log in server-side
      description: |
        Like `/demo/start`, but the random password is consumed internally and
        never returned to the client. The server creates the ephemeral org,
        runs the real login flow with the role's seed user, and returns the
        standard `LoginResponse` (with httpOnly `access_token` cookie set).

        Use this from any UI that would otherwise display the demo password
        in the DOM (audit F041).

        Rate-limited together with `/demo/start` (10/min per IP).
      tags: [admin]
      security: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                role:
                  type: string
                  enum: [admin, analyst]
                  description: Which seed account to log in as. Defaults to admin.
                  example: admin
      responses:
        '200':
          description: Successful demo login
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '429':
          description: Rate limit exceeded (10 req/min per IP).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Demo seed or login failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '503':
          description: Demo login not configured on this instance.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ── Auth ──────────────────────────────────────────────────────────────────
  /auth/login:
    post:
      summary: Log in and obtain a Paseto token
      tags: [auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Successful login
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Too many requests

  /auth/register:
    post:
      summary: Register a new account
      tags: [auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, name]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 10
                name:
                  type: string
      responses:
        '201':
          description: Account created
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/password-reset/request:
    post:
      summary: Request a password-reset e-mail
      tags: [auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Reset e-mail sent (always 200 to prevent user enumeration)

  /auth/password-reset/confirm:
    post:
      summary: Set a new password using a reset token
      tags: [auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, password]
              properties:
                token:
                  type: string
                password:
                  type: string
                  minLength: 10
      responses:
        '200':
          description: Password updated
        '400':
          description: Invalid or expired token

  /auth/refresh:
    post:
      summary: Refresh an access token using a refresh token
      tags: [auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: New token pair
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshResponse'
        '401':
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/me:
    get:
      summary: Return the authenticated user's identity for client-side rehydration
      description: |
        Replaces the previous localStorage-based user snapshot in the SPA
        (audit F032 — no PII in localStorage). The cookie/Paseto session is
        the source of truth; this endpoint just lets the front-end ask
        "who am I?" after a page reload.
      tags: [auth]
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/logout:
    post:
      summary: Invalidate the current access token
      tags: [auth]
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: logged out

  # ── Auth — Sessions ───────────────────────────────────────────────────────
  /auth/sessions:
    get:
      summary: List active sessions for the current user
      tags: [auth]
      responses:
        '200':
          description: Active sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SessionInfo'
    delete:
      summary: Revoke all other sessions (keep current)
      tags: [auth]
      responses:
        '200':
          description: Other sessions revoked
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: other sessions revoked

  /auth/sessions/{id}:
    delete:
      summary: Revoke a specific session
      tags: [auth]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Session revoked
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
        '404':
          description: Session not found

  # ── Auth — TOTP / 2FA ─────────────────────────────────────────────────────
  /auth/2fa/status:
    get:
      summary: Check whether 2FA is enabled for the current user
      tags: [auth]
      responses:
        '200':
          description: 2FA status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TOTPStatusResponse'

  /auth/2fa/setup:
    post:
      summary: Begin TOTP setup — returns secret and QR URI
      tags: [auth]
      responses:
        '200':
          description: TOTP secret and URI
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TOTPSetupResponse'
        '409':
          description: 2FA already enabled

  /auth/2fa/confirm:
    post:
      summary: Confirm TOTP setup with first code — activates 2FA and returns backup/recovery codes
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TOTPConfirmRequest'
      responses:
        '200':
          description: 2FA activated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TOTPConfirmResponse'
        '409':
          description: 2FA already enabled
        '422':
          description: Invalid TOTP code

  /auth/2fa/disable:
    post:
      summary: Disable 2FA (requires valid TOTP code)
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TOTPCodeRequest'
      responses:
        '200':
          description: 2FA disabled
        '422':
          description: Invalid TOTP code

  /auth/2fa/verify:
    post:
      summary: Verify a TOTP code or backup code (second-factor step after login)
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TOTPVerifyRequest'
      responses:
        '200':
          description: Verified
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: verified
        '422':
          description: Invalid code

  /auth/2fa/recovery:
    post:
      summary: Use a recovery code to obtain a new token pair (bypasses TOTP)
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TOTPRecoveryRequest'
      responses:
        '200':
          description: New token pair issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshResponse'
        '422':
          description: Invalid or already-used recovery code

  /auth/2fa/recovery-codes/regenerate:
    post:
      summary: Invalidate existing recovery codes and issue 8 new ones
      tags: [auth]
      responses:
        '200':
          description: New recovery codes
          content:
            application/json:
              schema:
                type: object
                properties:
                  recovery_codes:
                    type: array
                    items:
                      type: string
        '400':
          description: 2FA not enabled

  /auth/oidc/initiate:
    get:
      summary: Initiate OIDC/OAuth2 login flow via Casdoor (SSO Pro feature)
      tags: [auth]
      parameters:
        - name: provider
          in: query
          required: true
          schema:
            type: string
          description: OIDC provider name as configured in Casdoor
      responses:
        '200':
          description: State and Casdoor redirect URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  state:
                    type: string
                  redirect_url:
                    type: string
                    format: uri
        '501':
          description: OIDC not configured

  # ── SecPulse — Assets ─────────────────────────────────────────────────────
  /vaktscan/assets:
    get:
      summary: List assets
      tags: [vaktscan]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Paginated asset list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Asset'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
    post:
      summary: Create an asset
      tags: [vaktscan]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAssetRequest'
      responses:
        '201':
          description: Asset created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Asset'
        '400':
          description: Validation error

  /vaktscan/assets/{id}:
    get:
      summary: Get an asset
      tags: [vaktscan]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Asset
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Asset'
        '404':
          description: Not found
    put:
      summary: Update an asset
      tags: [vaktscan]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAssetRequest'
      responses:
        '200':
          description: Updated asset
    delete:
      summary: Delete an asset
      tags: [vaktscan]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Deleted

  /vaktscan/assets/import/csv:
    post:
      summary: Bulk-import assets from CSV
      tags: [vaktscan]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Import result
          content:
            application/json:
              schema:
                type: object
                properties:
                  inserted:
                    type: integer
                  errored:
                    type: integer
                  errors:
                    type: array
                    items:
                      type: string

  # ── SecPulse — Findings ───────────────────────────────────────────────────
  /vaktscan/findings:
    get:
      summary: List findings
      tags: [vaktscan]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: asset_id
          in: query
          schema:
            type: string
            format: uuid
        - name: severity
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Paginated findings
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Finding'
                  pagination:
                    $ref: '#/components/schemas/Pagination'

  /vaktscan/findings/{id}:
    get:
      summary: Get a finding
      tags: [vaktscan]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Finding
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Finding'
    put:
      summary: Update a finding (status, severity, assignee)
      tags: [vaktscan]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                severity:
                  type: string
                assignee:
                  type: string
      responses:
        '200':
          description: Updated finding

  # ── SecVitals — Frameworks ────────────────────────────────────────────────
  /vaktcomply/frameworks:
    get:
      summary: List installed frameworks
      tags: [vaktcomply]
      responses:
        '200':
          description: Framework list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Framework'

  /vaktcomply/frameworks/{id}:
    get:
      summary: Get a framework with score
      tags: [vaktcomply]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Framework detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Framework'
    delete:
      summary: Remove a framework
      tags: [vaktcomply]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Removed

  /vaktcomply/frameworks/{name}/enable:
    post:
      summary: Enable a framework by slug (e.g. ISO27001, NIS2, DORA, TISAX)
      tags: [vaktcomply]
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        '201':
          description: Framework enabled

  /vaktcomply/frameworks/{id}/controls:
    get:
      summary: List controls for a framework
      tags: [vaktcomply]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Controls
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Control'
                  pagination:
                    $ref: '#/components/schemas/Pagination'

  /vaktcomply/frameworks/{id}/report:
    get:
      summary: Get readiness report for a framework
      tags: [vaktcomply]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Readiness report

  /vaktcomply/frameworks/{id}/export-pdf:
    get:
      summary: Export framework readiness PDF (Pro)
      tags: [vaktcomply]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: PDF file
          content:
            application/pdf:
              schema:
                type: string
                format: binary

  /vaktcomply/controls/{id}:
    get:
      summary: Get a single control
      tags: [vaktcomply]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Control
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Control'

  /vaktcomply/controls/export/xlsx:
    get:
      summary: Export all controls as XLSX
      tags: [vaktcomply]
      responses:
        '200':
          description: XLSX file
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary

  # ── SecVitals — Risks ─────────────────────────────────────────────────────
  /vaktcomply/risks:
    get:
      summary: List risks
      tags: [vaktcomply]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Risk list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Risk'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
    post:
      summary: Create a risk
      tags: [vaktcomply]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Risk'
      responses:
        '201':
          description: Risk created

  /vaktcomply/risks/export/xlsx:
    get:
      summary: Export risks as XLSX
      tags: [vaktcomply]
      responses:
        '200':
          description: XLSX file

  # ── SecVitals — Incidents ─────────────────────────────────────────────────
  /vaktcomply/incidents:
    get:
      summary: List incidents
      tags: [vaktcomply]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Incident list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Incident'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
    post:
      summary: Create an incident
      tags: [vaktcomply]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Incident'
      responses:
        '201':
          description: Incident created

  /vaktcomply/incidents/{id}:
    get:
      summary: Get an incident
      tags: [vaktcomply]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Incident
    put:
      summary: Update an incident
      tags: [vaktcomply]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
